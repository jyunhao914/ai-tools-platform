<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI 工具資源平台</title>
<meta name="description" content="AI 工具資源平台 — 整合最新 AI 科技工具">
<meta property="og:title" content="AI 工具資源平台">
<meta property="og:description" content="AI 工具資源平台 — 整合最新 AI 科技工具">
<meta property="og:image" content="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap"></noscript>
<style>
:root{
  --bg:#07090f;--bg2:#0d1220;--bg3:#111827;
  --card:rgba(255,255,255,0.042);--card-h:rgba(255,255,255,0.075);
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --accent:#38bdf8;--accent2:#818cf8;--accent3:#34d399;
  --r:12px;--r2:18px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans TC',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;line-height:1.6}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
img{display:block;max-width:100%}

/* NAV */
.nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:60px;background:rgba(7,9,15,0.82);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:17px;flex-shrink:0}
.nav-logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff}
.nav-tabs{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{padding:8px 16px;border-radius:8px;font-size:14px;font-weight:500;color:var(--text2);transition:all .2s;white-space:nowrap}
.nav-tab:hover{color:var(--text);background:var(--card)}
.nav-tab.active{color:var(--accent);background:rgba(56,189,248,0.1)}
.nav-visit{font-size:13px;color:var(--text3);white-space:nowrap;flex-shrink:0}

/* ANNOUNCEMENT BANNER */
.announcement-banner{display:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;text-align:center;padding:10px 48px 10px 24px;font-size:14px;font-weight:500;position:relative;z-index:99}
.announcement-banner.show{display:block}
.announcement-banner .dismiss-btn{position:absolute;right:16px;top:50%;transform:translateY(-50%);background:none;border:none;color:#fff;font-size:18px;cursor:pointer;opacity:.7}
.announcement-banner .dismiss-btn:hover{opacity:1}

/* HERO */
.hero{position:relative;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 24px 60px;overflow:hidden}
.hero-bg{position:absolute;inset:0;z-index:0;pointer-events:none}
.hero-blob{position:absolute;border-radius:50%;filter:blur(120px);opacity:.18}
.hero-blob.b1{width:600px;height:600px;background:var(--accent);top:-200px;left:-100px}
.hero-blob.b2{width:500px;height:500px;background:var(--accent2);bottom:-150px;right:-80px}
.hero-blob.b3{width:400px;height:400px;background:var(--accent3);top:50%;left:60%;transform:translate(-50%,-50%)}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s)}
@keyframes twinkle{0%,100%{opacity:.1}50%{opacity:.8}}
.hero-content{position:relative;z-index:1;text-align:center;max-width:720px}
.hero-badge{display:inline-block;padding:6px 16px;border-radius:99px;font-size:13px;font-weight:600;color:var(--accent);background:rgba(56,189,248,0.1);border:1px solid rgba(56,189,248,0.2);margin-bottom:20px}
.hero-title{font-size:clamp(36px,6vw,56px);font-weight:700;line-height:1.15;margin-bottom:16px;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:clamp(15px,2.2vw,18px);color:var(--text2);max-width:520px;margin:0 auto 48px;white-space:pre-line}
.hero-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;width:100%;max-width:860px;position:relative;z-index:1}
.hero-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:28px 22px;text-align:left;cursor:pointer;transition:all .28s}
.hero-card:hover{background:var(--card-h);border-color:var(--border2);transform:translateY(-4px)}
.hero-card-ico{font-size:32px;margin-bottom:12px}
.hero-card-title{font-size:16px;font-weight:600;margin-bottom:6px}
.hero-card-desc{font-size:13px;color:var(--text2);line-height:1.5}

/* TOOLS SECTION */
.tools{padding:60px 24px 80px;max-width:1200px;margin:0 auto}
.tools-head{font-size:22px;font-weight:700;margin-bottom:28px}
.tools-head span{color:var(--accent)}
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:22px}
.tools-empty{text-align:center;padding:80px 24px;color:var(--text3);font-size:16px}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;display:flex;flex-direction:column}
.card:hover{border-color:var(--border2);background:var(--card-h)}

/* SLIDER */
.card-slider{position:relative;width:100%;aspect-ratio:16/9;background:var(--bg3);overflow:hidden}
.card-slider img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .35s}
.card-slider img.active{opacity:1}
.slider-btn{position:absolute;top:50%;transform:translateY(-50%);width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;z-index:2;opacity:0;transition:opacity .2s}
.card-slider:hover .slider-btn{opacity:1}
.slider-btn.prev{left:8px}
.slider-btn.next{right:8px}
.slider-dots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:2}
.slider-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.35);transition:background .2s}
.slider-dot.active{background:#fff}
.card-placeholder{width:100%;aspect-ratio:16/9;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:48px;color:var(--text3)}

/* CARD BODY */
.card-body{padding:18px 20px 20px;flex:1;display:flex;flex-direction:column}
.card-tag{display:inline-block;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;color:var(--accent);background:rgba(56,189,248,0.1);margin-bottom:10px;align-self:flex-start}
.card-title{font-size:16px;font-weight:600;margin-bottom:6px}
.card-desc{font-size:13px;color:var(--text2);line-height:1.55;margin-bottom:12px;flex:1;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;flex-wrap:wrap;gap:6px 12px;margin-bottom:14px}
.card-meta span{font-size:12px;color:var(--text3)}
.card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:auto}
.card-link{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2));transition:opacity .2s}
.card-link:hover{opacity:.85}
.card-views{font-size:12px;color:var(--text3)}

/* FOOTER */
.footer{text-align:center;padding:32px 24px;color:var(--text3);font-size:13px;border-top:1px solid var(--border)}

/* ADMIN BTN */
.admin-gear{position:fixed;bottom:24px;right:24px;width:44px;height:44px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:20px;z-index:90;transition:transform .3s}
.admin-gear:hover{transform:rotate(90deg)}

/* ADMIN OVERLAY */
.admin-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.admin-overlay.show{display:flex}
.admin-panel{background:#1e293b;border-radius:var(--r2);width:92vw;max-width:780px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.5)}
.admin-header{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--border2)}
.admin-header h2{font-size:18px;font-weight:700}
.admin-close{font-size:22px;color:var(--text3);cursor:pointer;transition:color .2s}
.admin-close:hover{color:var(--text)}
.admin-tabs{display:flex;gap:4px;padding:12px 24px 0;border-bottom:1px solid var(--border);flex-wrap:wrap}
.admin-tab{padding:8px 16px;border-radius:8px 8px 0 0;font-size:14px;font-weight:500;color:var(--text3);transition:all .2s;border-bottom:2px solid transparent}
.admin-tab.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(56,189,248,0.06)}
.admin-body{flex:1;overflow-y:auto;padding:20px 24px}
.admin-toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.admin-search{flex:1;min-width:180px;padding:8px 14px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:14px;outline:none}
.admin-search:focus{border-color:var(--accent)}
.admin-add-btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2));transition:opacity .2s}
.admin-add-btn:hover{opacity:.8}
.admin-cat-label{font-size:14px;font-weight:600;color:var(--accent);margin:18px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.admin-cat-label:first-child{margin-top:0}
.admin-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;background:rgba(255,255,255,0.03);margin-bottom:6px;transition:background .15s}
.admin-row:hover{background:rgba(255,255,255,0.06)}
.admin-row-thumb{width:32px;height:32px;border-radius:4px;object-fit:cover;flex-shrink:0;background:var(--bg3)}
.admin-row-thumb-placeholder{width:32px;height:32px;border-radius:4px;flex-shrink:0;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text3)}
.admin-row-title{flex:1;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.admin-row-title.hidden-card{opacity:.4}
.admin-row button{padding:5px 10px;border-radius:6px;font-size:12px;background:rgba(255,255,255,0.06);color:var(--text2);transition:all .15s}
.admin-row button:hover{background:rgba(255,255,255,0.12);color:var(--text)}
.admin-row button.del{color:#f87171}
.admin-row button.del:hover{background:rgba(248,113,113,0.15)}
.link-status{font-size:11px;margin-left:4px}

/* TOGGLE */
.toggle{position:relative;width:40px;height:22px;border-radius:99px;background:#475569;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--accent3)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .2s}
.toggle.on::after{transform:translateX(18px)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal{background:#1e293b;border-radius:var(--r2);width:92vw;max-width:680px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--border2)}
.modal-head h3{font-size:16px;font-weight:700}
.modal-body{padding:20px 24px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:14px}
.modal-field label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:5px}
.modal-field input,.modal-field textarea,.modal-field select{width:100%;padding:9px 13px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:14px;font-family:inherit;outline:none}
.modal-field input:focus,.modal-field textarea:focus,.modal-field select:focus{border-color:var(--accent)}
.modal-field textarea{resize:vertical;min-height:60px}
.modal-preview{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.modal-preview img{width:80px;height:50px;object-fit:cover;border-radius:6px;border:1px solid var(--border2)}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:14px 24px;border-top:1px solid var(--border2)}
.modal-btn{padding:9px 22px;border-radius:8px;font-size:14px;font-weight:600;transition:opacity .2s}
.modal-btn.cancel{background:rgba(255,255,255,0.08);color:var(--text2)}
.modal-btn.save{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.modal-btn:hover{opacity:.8}

/* ADMIN LIST (admins tab) */
.admin-email-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:rgba(255,255,255,0.03);margin-bottom:6px}
.admin-email-row span{flex:1;font-size:14px}
.admin-email-row button{padding:5px 10px;border-radius:6px;font-size:12px;background:rgba(248,113,113,0.1);color:#f87171}
.admin-email-add{display:flex;gap:8px;margin-bottom:16px}
.admin-email-add input{flex:1;padding:8px 13px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:14px;outline:none}
.admin-email-add button{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;color:#fff;background:linear-gradient(135deg,var(--accent3),var(--accent))}

/* PAGES ADMIN (category tab) */
.pages-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;background:rgba(255,255,255,0.03);margin-bottom:6px}
.pages-row span{flex:1;font-size:14px}
.pages-row button{padding:5px 10px;border-radius:6px;font-size:12px;background:rgba(255,255,255,0.06);color:var(--text2);transition:all .15s}
.pages-row button:hover{background:rgba(255,255,255,0.12);color:var(--text)}
.pages-row button.del{color:#f87171}

/* STATS DASHBOARD */
.stats-big-number{font-size:48px;font-weight:700;color:var(--accent);text-align:center;margin:16px 0 8px}
.stats-big-label{font-size:14px;color:var(--text2);text-align:center;margin-bottom:24px}
.stats-section-title{font-size:15px;font-weight:600;color:var(--text);margin:20px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.stats-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.stats-bar-label{font-size:13px;color:var(--text2);min-width:120px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stats-bar-track{flex:1;height:20px;background:rgba(255,255,255,0.05);border-radius:4px;overflow:hidden}
.stats-bar-fill{height:100%;border-radius:4px;background:linear-gradient(135deg,var(--accent),var(--accent2));transition:width .3s}
.stats-bar-value{font-size:12px;color:var(--text3);min-width:40px;text-align:right}
.stats-daily-chart{display:flex;align-items:flex-end;gap:8px;height:120px;padding:12px 0;margin-bottom:8px}
.stats-daily-bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.stats-daily-bar-fill{width:100%;min-width:24px;border-radius:4px 4px 0 0;background:linear-gradient(180deg,var(--accent),var(--accent2));transition:height .3s}
.stats-daily-bar-label{font-size:10px;color:var(--text3)}
.stats-daily-bar-count{font-size:11px;color:var(--text2)}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:10px;background:#334155;color:var(--text);font-size:14px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* ADMIN TABS SCROLL */
.admin-tabs{overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;flex-wrap:nowrap!important}
.admin-tabs::-webkit-scrollbar{display:none}

/* FILE CARDS */
.file-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:20px;display:flex;align-items:center;gap:16px;transition:all .28s}
.file-card:hover{background:var(--card-h);border-color:var(--border2);transform:translateY(-2px)}
.file-card-icon{font-size:36px;flex-shrink:0}
.file-card-body{flex:1;min-width:0}
.file-card-title{font-size:15px;font-weight:600;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-card-desc{font-size:13px;color:var(--text2);margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.file-card-meta{font-size:11px;color:var(--text3)}
.file-card-dl{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2));transition:opacity .2s;flex-shrink:0;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.file-card-dl:hover{opacity:.85}

/* UPLOAD MODAL EXTRAS */
.upload-progress{width:100%;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;margin-top:8px;display:none}
.upload-progress-bar{height:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:3px;width:0%;transition:width .3s}
.upload-warn{font-size:12px;color:#fbbf24;margin-top:4px;display:none}

/* RICH TEXT EDITOR */
.rte-toolbar{display:flex;gap:4px;padding:8px;background:rgba(255,255,255,0.04);border:1px solid var(--border2);border-radius:8px 8px 0 0;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;flex-wrap:nowrap}
.rte-toolbar::-webkit-scrollbar{display:none}
.rte-toolbar button{padding:6px 10px;border-radius:4px;font-size:13px;background:rgba(255,255,255,0.06);color:var(--text);border:1px solid transparent;transition:all .15s;white-space:nowrap;flex-shrink:0}
.rte-toolbar button:hover{background:rgba(255,255,255,0.12);border-color:var(--border2)}
.rte-editor{min-height:250px;max-height:400px;overflow-y:auto;padding:16px;border:1px solid var(--border2);border-top:none;border-radius:0 0 8px 8px;background:var(--bg3);color:var(--text);font-size:14px;line-height:1.7;outline:none}
.rte-editor h2{font-size:20px;font-weight:700;margin:12px 0 8px}
.rte-editor h3{font-size:17px;font-weight:600;margin:10px 0 6px}
.rte-editor img{max-width:100%;border-radius:8px;margin:8px 0}
.rte-editor a{color:var(--accent);text-decoration:underline}
.rte-editor ul,.rte-editor ol{padding-left:24px;margin:8px 0}

/* ARTICLE OVERLAY */
.article-overlay{position:fixed;inset:0;z-index:250;background:var(--bg);display:none;overflow-y:auto;animation:fadeIn .25s ease}
.article-overlay.show{display:block}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.article-reader{max-width:800px;margin:0 auto;padding:40px 24px 80px}
.article-back{padding:8px 18px;border-radius:8px;font-size:14px;font-weight:500;color:var(--text2);background:var(--card);border:1px solid var(--border);margin-bottom:24px;cursor:pointer;transition:all .2s}
.article-back:hover{color:var(--text);border-color:var(--border2)}
.article-reader h1{font-size:clamp(24px,4vw,36px);font-weight:700;line-height:1.3;margin-bottom:12px}
.article-meta{font-size:13px;color:var(--text3);margin-bottom:32px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.article-content{font-size:15px;line-height:1.9;color:var(--text)}
.article-content h2{font-size:22px;font-weight:700;margin:28px 0 12px;color:var(--text)}
.article-content h3{font-size:18px;font-weight:600;margin:20px 0 10px;color:var(--text)}
.article-content p{margin-bottom:16px}
.article-content img{max-width:100%;border-radius:8px;margin:16px 0}
.article-content a{color:var(--accent);text-decoration:underline}
.article-content ul,.article-content ol{padding-left:24px;margin-bottom:16px}
.article-content li{margin-bottom:6px}
.article-content blockquote{border-left:3px solid var(--accent);padding:8px 16px;margin:16px 0;color:var(--text2);background:var(--card);border-radius:0 8px 8px 0}
.article-cover{width:100%;max-height:400px;object-fit:cover;border-radius:var(--r2);margin-bottom:24px}

/* ARTICLE CARD (main page) */

.admin-file-row .file-info{flex:1;min-width:0}
.admin-file-row .file-info .file-name{font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.admin-file-row .file-info .file-detail{font-size:11px;color:var(--text3)}
.admin-file-row button{padding:5px 10px;border-radius:6px;font-size:12px;background:rgba(255,255,255,0.06);color:var(--text2);transition:all .15s}
.admin-file-row button:hover{background:rgba(255,255,255,0.12);color:var(--text)}

.admin-file-row button.del:hover{background:rgba(248,113,113,0.15)}

/* SCROLL ANIMATION */
.card{opacity:0;transform:translateY(20px);transition:opacity 0.4s ease,transform 0.4s ease}
.card.visible{opacity:1;transform:translateY(0)}
.card.visible:hover{transform:translateY(-3px)}

[data-theme="light"]{
  --bg:#f8fafc;--bg2:#ffffff;--bg3:#f1f5f9;

[data-theme="light"] .batch-toolbar button{background:rgba(0,0,0,0.04);color:var(--text);border-color:var(--border2)}

/* BATCH CHECKBOX */
.admin-row-checkbox{width:18px;height:18px;border-radius:4px;border:2px solid var(--border2);background:transparent;cursor:pointer;flex-shrink:0;appearance:none;-webkit-appearance:none;transition:all .15s;position:relative}

  var m=url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if(m)return'https://lh3.googleusercontent.com/d/'+m[1];
  m=url.match(/id=([a-zA-Z0-9_-]+)/);
  if(m)return'https://lh3.googleusercontent.com/d/'+m[1];
  return url;
}

function parseImgSpec(raw){
  if(!raw)return null;
  var parts=raw.split('|');
  var url=toDriveImg(parts[0].trim());
  var fit=parts[1]?parts[1].trim():'cover';
  var pos=parts[2]?parts[2].trim():'center';
  return{url:url,fit:fit,pos:pos};
}

function toast(msg){
  var t=$('toast');
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid=setTimeout(function(){t.classList.remove('show')},2200);
}

}

/* ====== CARD RENDERING ====== */
function esc(s){
  if(!s)return'';
  var d=document.createElement('div');
  d.textContent=s;
  return d.innerHTML;
}

function getCardImages(card){
  var imgs=[];
  var raw=card.imageUrl||card.imageUrls;
  if(!raw)return imgs;
  var lines=Array.isArray(raw)?raw:(typeof raw==='string'?raw.split('\n'):[]);
  lines.forEach(function(line){
    var trimmed=(typeof line==='string')?line.trim():'';
    if(trimmed)imgs.push(parseImgSpec(trimmed));
  });
  return imgs.filter(Boolean);
}

function buildSlider(imgs,card){
  if(!imgs.length){
    var ph=ce('div','card-placeholder',card.iconUrl?'<img src="'+esc(toDriveImg(card.iconUrl))+'" style="width:64px;height:64px;object-fit:contain;margin:auto">':'\uD83D\uDDBC');
    return ph;
  }
  var wrap=ce('div','card-slider');
  var idx=0;
  imgs.forEach(function(spec,i){
    var img=ce('img');
    img.src=spec.url;
    img.alt='';
    img.loading='lazy';
    img.decoding='async';
    img.style.objectFit=spec.fit;
    img.style.objectPosition=spec.pos;
    if(i===0)img.classList.add('active');
    wrap.appendChild(img);
  });
  if(imgs.length>1){
    var prev=ce('button','slider-btn prev','&#8249;');
    var next=ce('button','slider-btn next','&#8250;');
    prev.onclick=function(e){e.stopPropagation();slide(-1)};
    next.onclick=function(e){e.stopPropagation();slide(1)};
    wrap.appendChild(prev);
    wrap.appendChild(next);
    var dots=ce('div','slider-dots');
    imgs.forEach(function(_,i){
      var dot=ce('div','slider-dot'+(i===0?' active':''));
      dot.onclick=function(e){e.stopPropagation();goSlide(i)};
      dots.appendChild(dot);
    });
    wrap.appendChild(dots);
  }
  function slide(dir){
    var all=wrap.querySelectorAll('img');
    all[idx].classList.remove('active');
    idx=(idx+dir+all.length)%all.length;
    all[idx].classList.add('active');
    updateDots();
  }
  function goSlide(i){
    var all=wrap.querySelectorAll('img');
    all[idx].classList.remove('active');
    idx=i;
    all[idx].classList.add('active');
    updateDots();
  }
  function updateDots(){
    var dd=wrap.querySelectorAll('.slider-dot');
    dd.forEach(function(d,i){d.classList.toggle('active',i===idx)});
  }
  return wrap;
}

function renderCards(){
  if(_searchActive)return;
  var grid=$('toolsGrid');
  grid.innerHTML='';
  if(_activeTab==='\u95DC\u65BC\u6211\u5011'){
    renderAboutPage();
    return;
  }
  var filtered=CARDS.filter(function(c){return (c.page||c.category)===_activeTab&&c.visible!==false});
  if(!filtered.length&&!_files.filter(function(f){return f.category===_activeTab}).length&&!_articles.filter(function(a){return a.category===_activeTab}).length){
    grid.innerHTML='<div class="tools-empty">\uD83D\uDD0D \u6B64\u5206\u985E\u66AB\u7121\u5DE5\u5177</div>';
    return;
  }
  filtered.forEach(function(card,ci){
    var el=ce('div','card');
    var imgs=getCardImages(card);
    el.appendChild(buildSlider(imgs,card));
    var body=ce('div','card-body');
    if(card.tag)body.appendChild(ce('div','card-tag',esc(card.tag)));
    body.appendChild(ce('div','card-title',esc(card.title)));
    var _desc=card.description||card.desc;if(_desc)body.appendChild(ce('div','card-desc',esc(_desc)));
    if(card.meta1||card.meta2||card.meta3){
      var meta=ce('div','card-meta');
      if(card.meta1&&card.meta1!=='copy')meta.appendChild(ce('span','',esc(card.meta1)));
      if(card.meta2)meta.appendChild(ce('span','',esc(card.meta2)));
      if(card.meta3)meta.appendChild(ce('span','',esc(card.meta3)));
      body.appendChild(meta);
    }
    var foot=ce('div','card-foot');
    var isCopy=card.meta1==='copy';
    var link=ce('a','card-link',isCopy?'\uD83D\uDCCB \u8907\u88FD\u9023\u7D50':'\u2197 \u958B\u555F\u5DE5\u5177');
    if(isCopy){
      link.href='javascript:void(0)';
      link.onclick=function(e){
        e.preventDefault();
        copyText(card.linkUrl);
        toast('\u5DF2\u8907\u88FD\u9023\u7D50');
        gasAPI('recordClick',{title:card.title},null);
      };
    }else{
      link.href=card.linkUrl||'#';
      link.target='_blank';
      link.rel='noopener';
      link.onclick=function(){gasAPI('recordClick',{title:card.title},null)};
    }
    foot.appendChild(link);
    var views=card.views||(_statsData&&_statsData[card.title])||0;
    foot.appendChild(ce('span','card-views','\uD83D\uDC41 '+views+' \u6B21\u9EDE\u95B1'));
    body.appendChild(foot);
    el.appendChild(body);
    grid.appendChild(el);
  });

  /* Render files in this category */
  var catFiles=_files.filter(function(f){return f.category===_activeTab});
  if(catFiles.length) renderFileCards(grid,catFiles);

  /* Render articles in this category */
  var catArticles=_articles.filter(function(a){return a.category===_activeTab});
  if(catArticles.length) renderArticleCards(grid,catArticles);

  /* Update count */
  var totalCount=filtered.length+catFiles.length+catArticles.length;
  $('toolsHead').innerHTML=esc(_activeTab)+' <span>\u2014 \u5217\u8868\uFF08'+totalCount+' \u9805\uFF09</span>';

  observeCards();
}

function copyText(text){
  if(navigator.clipboard){navigator.clipboard.writeText(text).catch(function(){})}
  else{var ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta)}
}

var _dragCardCat=null;

function renderAdminCards(filter){

  batchTb.id='batchToolbar';

  var showBtn=ce('button','','\u6279\u6B21\u986F\u793A');showBtn.onclick=batchShow;batchTb.appendChild(showBtn);
  var delBatchBtn=ce('button','batch-del','\u6279\u6B21\u522A\u9664');delBatchBtn.onclick=batchDelete;batchTb.appendChild(delBatchBtn);

  var moveDD=ce('div','batch-move-dropdown');

  moveWrap.appendChild(moveBtn);

  body.appendChild(batchTb);

  var toolbar=ce('div','admin-toolbar');

  /* Visit count button */
  var visitBtn=ce('button','admin-add-btn','\uD83D\uDC41 \u7E3D\u700F\u89BD: '+(_totalVisits||0));
  visitBtn.title='\u9EDE\u64CA\u4FEE\u6539\u7E3D\u700F\u89BD\u6B21\u6578';
  visitBtn.style.cssText='margin-right:8px;font-size:13px';
  visitBtn.onclick=function(){
    var v=prompt('\u8A2D\u5B9A\u7E3D\u700F\u89BD\u6B21\u6578\uFF1A',_totalVisits||0);
    if(v===null)return;
    var num=parseInt(v,10);
    if(isNaN(num)||num<0){toast('\u8ACB\u8F38\u5165\u6709\u6548\u6578\u5B57');return}
    gasAPI('setVisitCount',{count:num},function(r){
      if(r&&r.ok){_totalVisits=num;updateVisit();visitBtn.innerHTML='\uD83D\uDC41 \u7E3D\u700F\u89BD: '+num;toast('\u5DF2\u66F4\u65B0')}
      else toast('\u66F4\u65B0\u5931\u6557');
    });
  };
  toolbar.appendChild(visitBtn);

  /* Search */
  var search=ce('input','admin-search');
  search.placeholder='\u641C\u5C0B\u5DE5\u5177...';
  search.value=filter||'';
  search.oninput=function(){renderAdminCards(this.value)};
  toolbar.appendChild(search);

  /* Link checker button (Feature 3) */
  var linkCheckBtn=ce('button','admin-add-btn','\uD83D\uDD17 \u6AA2\u67E5\u9023\u7D50');
  linkCheckBtn.style.cssText='font-size:13px';
  linkCheckBtn.onclick=function(){checkAllLinks()};
  toolbar.appendChild(linkCheckBtn);

  /* Export button (Feature 7) */
  var exportBtn=ce('button','admin-add-btn','\uD83D\uDCBE \u532F\u51FA');
  exportBtn.style.cssText='font-size:13px';
  exportBtn.onclick=function(){exportCards()};
  toolbar.appendChild(exportBtn);

  /* Import button (Feature 7) */
  var importBtn=ce('button','admin-add-btn','\uD83D\uDCBE \u532F\u5165');
  importBtn.style.cssText='font-size:13px';
  importBtn.onclick=function(){importInput.click()};
  toolbar.appendChild(importBtn);
  var importInput=ce('input');
  importInput.type='file';
  importInput.accept='.json';
  importInput.style.display='none';
  importInput.onchange=function(e){importCards(e)};
  toolbar.appendChild(importInput);

  /* Announcement section (Feature 5) */
  var announceBtn=ce('button','admin-add-btn','\uD83D\uDCE2 \u516C\u544A');
  announceBtn.style.cssText='font-size:13px';
  announceBtn.onclick=function(){openAnnouncementModal()};
  toolbar.appendChild(announceBtn);

  /* SEO button (Feature 6) */
  var seoBtn=ce('button','admin-add-btn','\uD83D\uDD0D SEO');
  seoBtn.style.cssText='font-size:13px';
  seoBtn.onclick=function(){openSEOModal()};
  toolbar.appendChild(seoBtn);

  body.appendChild(toolbar);

  var groups={};
  PAGES.forEach(function(p){groups[p]=[]});
  _adminCards.forEach(function(c){
    if(!groups[c.page])groups[c.page]=[];
    if(filter){
      var q=filter.toLowerCase();
      if((c.title||'').toLowerCase().indexOf(q)<0&&(c.tag||'').toLowerCase().indexOf(q)<0)return;
    }
    groups[c.page].push(c);
  });

  PAGES.forEach(function(page){
    var cards=groups[page]||[];
    var label=ce('div','admin-cat-label');
    var addBtn=ce('button','admin-add-btn','+\u65B0\u589E');
    addBtn.onclick=function(){openEditModal(null,page)};
    label.textContent=page+' ('+cards.length+')';
    label.style.display='flex';
    label.style.alignItems='center';
    label.style.justifyContent='space-between';
    label.appendChild(addBtn);
    body.appendChild(label);

    cards.forEach(function(card,cardIdx){
      var row=ce('div','admin-row');
      row.setAttribute('draggable','true');
      row.setAttribute('data-card-id',card.id);
      row.setAttribute('data-card-cat',card.page||card.category);

      /* Drag events */
      row.addEventListener('dragstart',function(e){
        _dragCardId=card.id;
        _dragCardCat=card.page||card.category;
        row.classList.add('dragging');
        e.dataTransfer.effectAllowed='move';
        e.dataTransfer.setData('text/plain',card.id);
      });
      row.addEventListener('dragend',function(){
        row.classList.remove('dragging');
        _dragCardId=null;_dragCardCat=null;
        document.querySelectorAll('.admin-row.drag-over').forEach(function(el){el.classList.remove('drag-over')});
      });
      row.addEventListener('dragover',function(e){
        e.preventDefault();
        e.dataTransfer.dropEffect='move';
        var targetCat=row.getAttribute('data-card-cat');
        if(_dragCardCat===targetCat&&_dragCardId!==card.id){
          document.querySelectorAll('.admin-row.drag-over').forEach(function(el){el.classList.remove('drag-over')});
          row.classList.add('drag-over');
        }
      });
      row.addEventListener('dragleave',function(){
        row.classList.remove('drag-over');
      });
      row.addEventListener('drop',function(e){
        e.preventDefault();
        row.classList.remove('drag-over');
        var targetCat=row.getAttribute('data-card-cat');
        if(_dragCardCat!==targetCat)return;
        /* Reorder within category */
        var catCards=_adminCards.filter(function(c){return (c.page||c.category)===targetCat});
        var fromIdx=-1,toIdx=-1;
        for(var i=0;i<catCards.length;i++){
          if(String(catCards[i].id)===String(_dragCardId))fromIdx=i;
          if(String(catCards[i].id)===String(card.id))toIdx=i;
        }
        if(fromIdx<0||toIdx<0||fromIdx===toIdx)return;
        /* Reorder in _adminCards */
        var allIdx=[];
        _adminCards.forEach(function(c,i){if((c.page||c.category)===targetCat)allIdx.push(i)});
        var draggedArr=_adminCards.splice(allIdx[fromIdx],1);
        /* Recalculate target position */
        var newAllIdx=[];
        _adminCards.forEach(function(c,i){if((c.page||c.category)===targetCat)newAllIdx.push(i)});
        var insertAt=toIdx>=newAllIdx.length?newAllIdx[newAllIdx.length-1]+1:newAllIdx[toIdx];
        _adminCards.splice(insertAt,0,draggedArr[0]);
        /* Send full order to backend */
        var orderedIds=_adminCards.map(function(c){return{id:c.id}});
        gasAPI('reorderAll',{data:JSON.stringify(orderedIds)},function(r){
          if(r&&r.ok){toast('\u5DF2\u91CD\u65B0\u6392\u5E8F');refreshMainData()}
          else toast('\u6392\u5E8F\u5931\u6557');
        });
        renderAdminCards(filter);
      });

      /* Touch events for mobile drag */
      (function(rowEl,cardObj){
        var touchStartY=0,touchClone=null,touchMoving=false;
        rowEl.addEventListener('touchstart',function(e){
          if(e.touches.length!==1)return;
          touchStartY=e.touches[0].clientY;
          touchMoving=false;
        },{passive:true});
        rowEl.addEventListener('touchmove',function(e){
          if(!touchMoving&&Math.abs(e.touches[0].clientY-touchStartY)>10){
            touchMoving=true;
          }
        },{passive:true});
      })(row,card);

      /* Checkbox for batch */
      var cb=ce('input','admin-row-checkbox');
      cb.type='checkbox';
      cb.checked=!!_batchSelected[card.id];
      cb.onchange=function(){
        _batchSelected[card.id]=this.checked;
        updateBatchToolbar();
      };
      row.appendChild(cb);

      /* Feature 8: Thumbnail */
      var thumbUrl=card.imageUrls&&card.imageUrls.length?toDriveImg((card.imageUrls[0]||'').split('|')[0]):'';
      if(thumbUrl){
        var thumb=ce('img','admin-row-thumb');
        thumb.src=thumbUrl;
        thumb.onerror=function(){this.style.display='none'};
        row.appendChild(thumb);
      }else{
        var pholder=ce('div','admin-row-thumb-placeholder','\uD83D\uDDBC');
        row.appendChild(pholder);
      }

      var toggle=ce('div','toggle'+(card.visible!==false?' on':''));
      toggle.onclick=function(){
        card.visible=!this.classList.contains('on');
        this.classList.toggle('on');
        gasAPI('saveCard',{data:JSON.stringify(card)},function(r){
          if(r&&r.ok)toast('\u5DF2\u66F4\u65B0');
          refreshMainData();
        });
      };
      row.appendChild(toggle);

      var titleSpan=ce('span','admin-row-title'+(card.visible===false?' hidden-card':''),esc(card.title));
      titleSpan.id='card-title-'+card.id;
      row.appendChild(titleSpan);

      var upBtn=ce('button','reorder-btn','\u25B2');
      upBtn.title='\u4E0A\u79FB';
      upBtn.onclick=function(){gasAPI('reorderCard',{id:card.id,dir:'up'},function(){loadAdminCards();refreshMainData()})};
      row.appendChild(upBtn);

      var downBtn=ce('button','reorder-btn','\u25BC');
      downBtn.title='\u4E0B\u79FB';
      downBtn.onclick=function(){gasAPI('reorderCard',{id:card.id,dir:'down'},function(){loadAdminCards();refreshMainData()})};
      row.appendChild(downBtn);

      var editBtn=ce('button','','\u270F');
      editBtn.onclick=function(){openEditModal(card)};
      row.appendChild(editBtn);

      /* Feature 1: Duplicate button */
      var dupBtn=ce('button','','\uD83D\uDCCB');
      dupBtn.title='\u8907\u88FD\u5DE5\u5177';
      dupBtn.onclick=function(){duplicateCard(card)};
      row.appendChild(dupBtn);

      var viewBtn=ce('button','admin-view-btn','\uD83D\uDC41 '+(card.views||0));
      viewBtn.title='\u9EDE\u64CA\u4FEE\u6539\u700F\u89BD\u6578';
      viewBtn.style.cssText='min-width:60px;font-size:12px';
      viewBtn.onclick=function(){
        var v=prompt('\u8A2D\u5B9A '+card.title+' \u7684\u700F\u89BD\u6578\uFF1A',card.views||0);
        if(v===null)return;
        var num=parseInt(v,10);
        if(isNaN(num)||num<0){toast('\u8ACB\u8F38\u5165\u6709\u6548\u6578\u5B57');return}
        gasAPI('setStats',{id:card.id,count:num},function(r){
          if(r&&r.ok){toast('\u5DF2\u66F4\u65B0');loadAdminCards();refreshMainData()}
          else toast('\u66F4\u65B0\u5931\u6557');
        });
      };
      row.appendChild(viewBtn);

      var delBtn=ce('button','del','\u2716');
      delBtn.onclick=function(){
        if(!confirm('\u78BA\u5B9A\u522A\u9664 '+card.title+'\uFF1F'))return;
        gasAPI('deleteCard',{id:card.id},function(r){if(r&&r.ok){toast('\u5DF2\u522A\u9664');loadAdminCards();refreshMainData()}});
      };
      row.appendChild(delBtn);

      body.appendChild(row);
    });
  });

  /* Restore batch toolbar state */
  updateBatchToolbar();
}

    else toast('\u8907\u88FD\u5931\u6557');

/* ====== Feature 3: Link Checker ====== */
function checkAllLinks(){
  toast('\u6B63\u5728\u6AA2\u67E5\u9023\u7D50...');
  var cardsWithLink=_adminCards.filter(function(c){return c.linkUrl});
  var remaining=cardsWithLink.length;
  if(!remaining){toast('\u6C92\u6709\u9023\u7D50\u53EF\u6AA2\u67E5');return}
  cardsWithLink.forEach(function(card){
    var titleEl=document.getElementById('card-title-'+card.id);
    if(!titleEl)return;
    /* Remove old status */
    var oldStatus=titleEl.querySelector('.link-status');
    if(oldStatus)oldStatus.remove();
    var statusSpan=ce('span','link-status','...');
    statusSpan.style.color='var(--text3)';
    titleEl.appendChild(statusSpan);
    /* Use img trick to check if URL is reachable */
    var img=new Image();
    var done=false;
    var timer=setTimeout(function(){
      if(!done){done=true;statusSpan.textContent=' \u26A0';statusSpan.style.color='#f87171';remaining--;if(!remaining)toast('\u9023\u7D50\u6AA2\u67E5\u5B8C\u6210')}
    },6000);
    img.onload=function(){
      if(!done){done=true;clearTimeout(timer);statusSpan.textContent=' \u2713';statusSpan.style.color='#34d399';remaining--;if(!remaining)toast('\u9023\u7D50\u6AA2\u67E5\u5B8C\u6210')}
    };
    img.onerror=function(){
      /* img error doesn't always mean broken link — try fetch as fallback */
      var f=new Image();
      var done2=false;
      f.onload=function(){
        if(!done){done=true;clearTimeout(timer);statusSpan.textContent=' \u2713';statusSpan.style.color='#34d399';remaining--;if(!remaining)toast('\u9023\u7D50\u6AA2\u67E5\u5B8C\u6210')}
      };
      f.onerror=function(){
        /* For cross-origin URLs, img always errors. Use a generous approach: mark as "?" */
        if(!done){done=true;clearTimeout(timer);statusSpan.textContent=' \u2753';statusSpan.style.color='#fbbf24';statusSpan.title='\u7121\u6CD5\u78BA\u8A8D (\u8DE8\u57DF\u9650\u5236)';remaining--;if(!remaining)toast('\u9023\u7D50\u6AA2\u67E5\u5B8C\u6210')}
      };
      var url=card.linkUrl;
      try{var u=new URL(url);f.src=u.origin+'/favicon.ico'}catch(e){
        if(!done){done=true;clearTimeout(timer);statusSpan.textContent=' \u26A0';statusSpan.style.color='#f87171';remaining--;if(!remaining)toast('\u9023\u7D50\u6AA2\u67E5\u5B8C\u6210')}
      }
    };
    img.src=card.linkUrl;
  });
}

/* ====== Feature 7: Export/Import ====== */
function exportCards(){
  var data=JSON.stringify(_adminCards,null,2);
  var blob=new Blob([data],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=ce('a');
  a.href=url;
  a.download='ai-tools-export-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('\u5DF2\u532F\u51FA');
}

function importCards(e){
  var file=e.target.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var arr=JSON.parse(ev.target.result);
      if(!Array.isArray(arr)){toast('\u683C\u5F0F\u932F\u8AA4\uFF1A\u9700\u8981\u9663\u5217');return}
      if(!confirm('\u5373\u5C07\u532F\u5165 '+arr.length+' \u500B\u5DE5\u5177\uFF0C\u662F\u5426\u7E7C\u7E8C\uFF1F'))return;
      var idx=0;
      function saveNext(){
        if(idx>=arr.length){toast('\u532F\u5165\u5B8C\u6210');loadAdminCards();refreshMainData();return}
        var card=arr[idx];
        delete card.id;
        delete card.views;
        gasAPI('saveCard',{data:JSON.stringify(card)},function(r){
          idx++;
          saveNext();
        });
      }
      saveNext();
    }catch(err){toast('\u89E3\u6790 JSON \u5931\u6557');}
  };
  reader.readAsText(file);
  e.target.value='';
}

function openEditModal(card,defaultPage){
  _editCard=card?JSON.parse(JSON.stringify(card)):null;
  $('modalTitle').textContent=card?'\u7DE8\u8F2F\u5DE5\u5177':'\u65B0\u589E\u5DE5\u5177';
  var body=$('modalBody');
  body.innerHTML='';

  var fields=[
    {key:'page',label:'\u5206\u985E',type:'select',opts:PAGES},
    {key:'title',label:'\u6A19\u984C',type:'text'},
    {key:'tag',label:'\u6A19\u7C64',type:'text'},
    {key:'desc',label:'\u63CF\u8FF0',type:'textarea'},
    {key:'linkUrl',label:'\u9023\u7D50 URL',type:'text'},
    {key:'imageUrls',label:'\u5716\u7247 URL (\u6BCF\u884C\u4E00\u500B)',type:'textarea'},
    {key:'iconUrl',label:'\u5716\u793A URL',type:'text'},
    {key:'meta1',label:'Meta1',type:'text'},
    {key:'meta2',label:'Meta2',type:'text'},
    {key:'meta3',label:'Meta3',type:'text'},
    {key:'visible',label:'\u4E0A\u67B6\u986F\u793A',type:'toggle'}
  ];

  fields.forEach(function(f){
    var div=ce('div','modal-field');
    var lbl=ce('label','',f.label);
    div.appendChild(lbl);

    if(f.type==='select'){
      var sel=ce('select');
      sel.id='mf_'+f.key;
      f.opts.forEach(function(o){
        var opt=ce('option','',esc(o));
        opt.value=o;
        if(card&&card[f.key]===o)opt.selected=true;
        else if(!card&&defaultPage===o)opt.selected=true;
        sel.appendChild(opt);
      });
      div.appendChild(sel);
    }else if(f.type==='textarea'){
      var ta=ce('textarea');
      ta.id='mf_'+f.key;
      ta.rows=3;
      var val=card?card[f.key]||'':'';
      if(Array.isArray(val))val=val.join('\n');
      ta.value=val;
      div.appendChild(ta);
      if(f.key==='imageUrls'){
        var preview=ce('div','modal-preview');
        preview.id='mf_imgPreview';
        updateImgPreview(preview,ta.value);
        ta.oninput=function(){updateImgPreview(preview,ta.value)};
        div.appendChild(preview);
      }
    }else if(f.type==='toggle'){
      var tog=ce('div','toggle'+((card?card.visible!==false:true)?' on':''));
      tog.id='mf_'+f.key;
      tog.onclick=function(){this.classList.toggle('on')};
      div.appendChild(tog);
    }else{
      var inp=ce('input');
      inp.id='mf_'+f.key;
      inp.type='text';
      inp.value=card?card[f.key]||'':'';
      div.appendChild(inp);
    }
    body.appendChild(div);
  });

  $('modalOverlay').classList.add('show');
}

function updateImgPreview(container,val){
  container.innerHTML='';
  if(!val)return;
  val.split('\n').forEach(function(line){
    var spec=parseImgSpec(line.trim());
    if(!spec)return;
    var img=ce('img');
    img.src=spec.url;
    img.onerror=function(){this.style.display='none'};
    container.appendChild(img);
  });
}

$('modalSave').onclick=function(){
  /* File upload save */
  if(_editCard==='__upload__'){
    var fileInput=document.getElementById('mf_uploadFile');
    var file=fileInput&&fileInput.files[0];
    if(!file){toast('\u8ACB\u9078\u64C7\u6A94\u6848');return}
    var title=(document.getElementById('mf_uploadTitle')||{}).value||file.name;
    var desc=(document.getElementById('mf_uploadDesc')||{}).value||'';
    var category=(document.getElementById('mf_uploadCategory')||{}).value||'';
    uploadFile(file,title,desc,category,function(res){
      if(res&&res.ok){
        toast('\u4E0A\u50B3\u6210\u529F');
        $('modalOverlay').classList.remove('show');
        _editCard=null;
        loadAdminFiles();
        refreshMainData();
      }else{
        toast('\u4E0A\u50B3\u5931\u6557'+(res&&res.error?': '+res.error:''));
      }
    });
    return;
  }
  /* Article save */
  if(_editCard==='__article__'){
    var bodyEl=$('modalBody');
    var existingArticle=bodyEl._articleData;
    var articleData=existingArticle||{};
    articleData.title=(document.getElementById('mf_articleTitle')||{}).value||'';
    articleData.author=(document.getElementById('mf_articleAuthor')||{}).value||'';
    articleData.coverImage=(document.getElementById('mf_articleCover')||{}).value||'';
    articleData.category=(document.getElementById('mf_articleCategory')||{}).value||'';
    articleData.visible=document.getElementById('mf_articleVisible').classList.contains('on');
    var editor=document.getElementById('articleEditor');
    articleData.content=editor?editor.innerHTML:'';
    if(!articleData.title){toast('\u8ACB\u8F38\u5165\u6A19\u984C');return}
    /* Use POST for article save (content can be large) */
    var xhr=new XMLHttpRequest();
    var fd=new FormData();
    fd.append('action','saveArticle');
    fd.append('pw',sessionStorage.getItem('admin_pw')||'');
    fd.append('data',JSON.stringify(articleData));
    xhr.open('POST',GAS_API);
    xhr.onload=function(){
      try{var r=JSON.parse(xhr.responseText);
        if(r&&r.ok){
          toast('\u6587\u7AE0\u5DF2\u5132\u5B58');
          $('modalOverlay').classList.remove('show');
          _editCard=null;
          loadAdminArticles();
          refreshMainData();
        }else{toast('\u5132\u5B58\u5931\u6557')}
      }catch(e){toast('\u5132\u5B58\u5931\u6557')}
    };
    xhr.onerror=function(){toast('\u5132\u5B58\u5931\u6557')};
    xhr.send(fd);
    return;
  }
  /* Feature 5: Announcement save */
  if(_editCard==='__announcement__'){
    var annText=(document.getElementById('mf_announcement')||{}).value||'';
    var annVisible=document.getElementById('mf_announcement_visible').classList.contains('on')?'true':'false';
    gasAPI('saveSetting',{key:'announcement',value:annText},function(r1){
      gasAPI('saveSetting',{key:'announcement_visible',value:annVisible},function(r2){
        _settings.announcement=annText;
        _settings.announcement_visible=annVisible;
        applyAnnouncement();
        toast('\u516C\u544A\u5DF2\u5132\u5B58');
        $('modalOverlay').classList.remove('show');
        _editCard=null;
      });
    });
    return;
  }
  /* Feature 6: SEO save */
  if(_editCard==='__seo__'){
    var seoFields=['seo_title','seo_description','seo_og_image'];
    var idx=0;
    function saveNextSEO(){
      if(idx>=seoFields.length){
        applySEO();
        toast('SEO \u5DF2\u5132\u5B58');
        $('modalOverlay').classList.remove('show');
        _editCard=null;
        return;
      }
      var key=seoFields[idx];
      var val=(document.getElementById('mf_'+key)||{}).value||'';
      _settings[key]=val;
      gasAPI('saveSetting',{key:key,value:val},function(){idx++;saveNextSEO()});
    }
    saveNextSEO();
    return;
  }

  /* Normal card save */
  var card=_editCard||{};
  card.page=document.getElementById('mf_page').value;
  card.category=card.page;
  card.title=document.getElementById('mf_title').value;
  card.tag=document.getElementById('mf_tag').value;
  card.desc=document.getElementById('mf_desc').value;
  card.linkUrl=document.getElementById('mf_linkUrl').value;
  var imgRaw=document.getElementById('mf_imageUrls').value;
  card.imageUrls=imgRaw?imgRaw.split('\n').map(function(s){return s.trim()}).filter(function(s){return s}):[];
  card.iconUrl=(document.getElementById('mf_iconUrl')||{}).value||'';
  card.meta1=document.getElementById('mf_meta1').value;
  card.meta2=document.getElementById('mf_meta2').value;
  card.meta3=document.getElementById('mf_meta3').value;
  card.visible=document.getElementById('mf_visible').classList.contains('on');

  if(!card.title){toast('\u8ACB\u8F38\u5165\u6A19\u984C');return}

  gasAPI('saveCard',{data:JSON.stringify(card)},function(r){
    if(r&&r.ok){
      toast('\u5DF2\u5132\u5B58');
      $('modalOverlay').classList.remove('show');
      _editCard=null;
      loadAdminCards();
      refreshMainData();
    }else{
      toast('\u5132\u5B58\u5931\u6557');
    }
  });
};

      var tmp=PAGES[i];PAGES[i]=PAGES[i-1];PAGES[i-1]=tmp;
      savePagesAndRefresh();
    };
    row.appendChild(upBtn);

    var downBtn=ce('button','','\u25BC');
    downBtn.title='\u4E0B\u79FB';
    downBtn.onclick=function(){
      if(i>=PAGES.length-1)return;
      var tmp=PAGES[i];PAGES[i]=PAGES[i+1];PAGES[i+1]=tmp;
      savePagesAndRefresh();
    };
    row.appendChild(downBtn);

    var renameBtn=ce('button','','\u270F');
    renameBtn.title='\u91CD\u65B0\u547D\u540D';
    renameBtn.onclick=function(){
      var newName=prompt('\u65B0\u540D\u7A31\uFF1A',page);
      if(!newName||newName===page)return;
      PAGES[i]=newName;
      /* Update cards that reference this category */
      _adminCards.forEach(function(c){
        if(c.page===page||c.category===page){
          c.page=newName;c.category=newName;
          gasAPI('saveCard',{data:JSON.stringify(c)},null);
        }
      });
      savePagesAndRefresh();
    };
    row.appendChild(renameBtn);

    var delBtn=ce('button','del','\u2716');
    delBtn.onclick=function(){
      if(!confirm('\u78BA\u5B9A\u522A\u9664\u5206\u985E\u300C'+page+'\u300D\uFF1F'))return;
      PAGES.splice(i,1);
      savePagesAndRefresh();
    };
    row.appendChild(delBtn);

    body.appendChild(row);
  });
}

/* ====== INTERSECTION OBSERVER FOR CARDS ====== */
var _cardObserver=null;
function observeCards(){
  if(_cardObserver)_cardObserver.disconnect();
  if(!('IntersectionObserver' in window)){
    document.querySelectorAll('.card').forEach(function(c){c.classList.add('visible')});
    return;
  }
  _cardObserver=new IntersectionObserver(function(entries){
    entries.forEach(function(entry){
      if(entry.isIntersecting){
        entry.target.classList.add('visible');
        _cardObserver.unobserve(entry.target);
      }
    });
  },{threshold:0.08});
  document.querySelectorAll('.card:not(.visible)').forEach(function(c){
    _cardObserver.observe(c);
  });
}

/* ====== FILE TYPE ICONS ====== */
function fileIcon(mimeType){
  if(!mimeType)return'\uD83D\uDCC4';
  if(mimeType.indexOf('image')>=0)return'\uD83D\uDDBC\uFE0F';
  if(mimeType.indexOf('pdf')>=0)return'\uD83D\uDCD5';
  if(mimeType.indexOf('presentation')>=0||mimeType.indexOf('ppt')>=0)return'\uD83D\uDCCA';
  if(mimeType.indexOf('word')>=0||mimeType.indexOf('doc')>=0)return'\uD83D\uDCC4';
  if(mimeType.indexOf('text')>=0)return'\uD83D\uDCDD';
  return'\uD83D\uDCC1';
}

    }
    body.appendChild(div);
  });

  $('modalOverlay').classList.add('show');
}

function uploadFile(file, title, desc, category, callback){
  var reader=new FileReader();
  reader.onload=function(){
    var base64=reader.result.split(',')[1];
    var xhr=new XMLHttpRequest();
    var formData=new FormData();
    formData.append('action','uploadFile');
    formData.append('pw',sessionStorage.getItem('admin_pw')||'');
    formData.append('fileData',base64);
    formData.append('fileName',file.name);
    formData.append('mimeType',file.type||'application/octet-stream');
    formData.append('title',title);
    formData.append('desc',desc);
    formData.append('category',category);

    var progress=document.getElementById('uploadProgress');
    var bar=document.getElementById('uploadProgressBar');
    if(progress)progress.style.display='block';

    xhr.upload.onprogress=function(e){
      if(e.lengthComputable&&bar){
        bar.style.width=Math.round(e.loaded/e.total*100)+'%';
      }
    };
    xhr.open('POST',GAS_API);
    xhr.onload=function(){
      if(bar)bar.style.width='100%';
      try{callback(JSON.parse(xhr.responseText))}catch(e){callback(null)}
    };
    xhr.onerror=function(){callback(null)};
    xhr.send(formData);
  };
  reader.readAsDataURL(file);
}

function openArticleEditor(article){
  _editCard='__article__';
  $('modalTitle').textContent=article?'\u7DE8\u8F2F\u6587\u7AE0':'\u65B0\u589E\u6587\u7AE0';
  var body=$('modalBody');
  body.innerHTML='';

  /* Store article ref for save */
  body._articleData=article?JSON.parse(JSON.stringify(article)):null;

  var fields=[
    {key:'articleTitle',label:'\u6A19\u984C',type:'text',val:article?article.title:''},
    {key:'articleAuthor',label:'\u4F5C\u8005',type:'text',val:article?article.author:''},
    {key:'articleCover',label:'\u5C01\u9762\u5716\u7247 URL',type:'text',val:article?article.coverImage:''},
    {key:'articleCategory',label:'\u5206\u985E',type:'select',val:article?article.category:''},
    {key:'articleVisible',label:'\u767C\u5E03',type:'toggle',val:article?article.visible:true}
  ];

  fields.forEach(function(f){
    var div=ce('div','modal-field');
    div.appendChild(ce('label','',f.label));
    if(f.type==='toggle'){
      var tog=ce('div','toggle'+(f.val?' on':''));
      tog.id='mf_'+f.key;
      tog.onclick=function(){this.classList.toggle('on')};
      div.appendChild(tog);
    }else if(f.type==='select'){
      var sel=ce('select');
      sel.id='mf_'+f.key;
      PAGES.forEach(function(p){var opt=ce('option','',esc(p));opt.value=p;if(f.val===p)opt.selected=true;sel.appendChild(opt)});
      div.appendChild(sel);
    }else{
      var inp=ce('input');
      inp.id='mf_'+f.key;
      inp.type='text';
      inp.value=f.val||'';
      div.appendChild(inp);
    }
    body.appendChild(div);
  });

  /* Rich Text Editor */
  var editorDiv=ce('div','modal-field');
  editorDiv.appendChild(ce('label','','\u6587\u7AE0\u5167\u5BB9'));

  var toolbar=ce('div','rte-toolbar');
  var cmds=[
    {cmd:'bold',html:'<b>B</b>'},
    {cmd:'italic',html:'<i>I</i>'},
    {cmd:'underline',html:'<u>U</u>'},
    {cmd:'insertUnorderedList',html:'\u2022 List'},
    {cmd:'insertOrderedList',html:'1. List'},
    {cmd:'formatBlock',html:'H2',val:'h2'},
    {cmd:'formatBlock',html:'H3',val:'h3'},
    {cmd:'createLink',html:'\uD83D\uDD17'},
    {cmd:'insertImage',html:'\uD83D\uDDBC\uFE0F'},
    {cmd:'removeFormat',html:'\u2715'}
  ];
  cmds.forEach(function(c){
    var btn=ce('button','',c.html);
    btn.onmousedown=function(e){e.preventDefault()};
    btn.onclick=function(e){
      e.preventDefault();
      if(c.cmd==='createLink'){
        var url=prompt('\u8ACB\u8F38\u5165\u9023\u7D50 URL:','https://');
        if(url)document.execCommand('createLink',false,url);
      }else if(c.cmd==='insertImage'){
        var url=prompt('\u8ACB\u8F38\u5165\u5716\u7247 URL:','https://');
        if(url)document.execCommand('insertImage',false,url);
      }else if(c.val){
        document.execCommand(c.cmd,false,c.val);
      }else{
        document.execCommand(c.cmd,false,null);
      }
    };
    toolbar.appendChild(btn);
  });
  editorDiv.appendChild(toolbar);

  var editor=ce('div','rte-editor');
  editor.contentEditable='true';
  editor.id='articleEditor';
  if(article&&article.content)editor.innerHTML=article.content;
  editorDiv.appendChild(editor);
  body.appendChild(editorDiv);

  $('modalOverlay').classList.add('show');
}

/* ====== ARTICLE READER (public) ====== */
function openArticleReader(article){
  var overlay=$('articleOverlay');
  $('articleTitle').textContent=article.title||'';
  var cover=$('articleCover');
  if(article.coverImage){
    cover.src=toDriveImg(article.coverImage);
    cover.style.display='block';
    cover.onerror=function(){this.style.display='none'};
  }else{
    cover.style.display='none';
  }
  $('articleMeta').textContent=(article.author||'\u4F5A\u540D')+' \u30FB '+(article.publishDate?article.publishDate.slice(0,10):'');
  /* Need to fetch full content */
  gasAPI('getArticle',{id:article.id},function(res){
    if(res&&res.ok&&res.article){
      $('articleContent').innerHTML=res.article.content||'';
    }else{
      $('articleContent').innerHTML=article.content||'';
    }
  });
  overlay.classList.add('show');
  document.body.style.overflow='hidden';
}

$('articleBack').onclick=function(){
  $('articleOverlay').classList.remove('show');
  document.body.style.overflow='';
};

/* ====== RENDER FILES ON MAIN PAGE ====== */
function renderFileCards(grid, files){
  files.forEach(function(file){
    var card=ce('div','file-card');
    card.appendChild(ce('div','file-card-icon',fileIcon(file.mimeType)));
    var body=ce('div','file-card-body');
    body.appendChild(ce('div','file-card-title',esc(file.title||file.fileName)));
    if(file.desc)body.appendChild(ce('div','file-card-desc',esc(file.desc)));
    body.appendChild(ce('div','file-card-meta',esc(file.fileName)+' \u30FB '+(file.uploadDate?file.uploadDate.slice(0,10):'')));
    card.appendChild(body);
    var dl=ce('a','file-card-dl','\u2B07 \u4E0B\u8F09');
    dl.href=file.fileUrl||'#';
    dl.target='_blank';
    dl.rel='noopener';
    card.appendChild(dl);
    grid.appendChild(card);
  });
}

/* ====== RENDER ARTICLE CARDS ON MAIN PAGE ====== */
function renderArticleCards(grid, articles){
  articles.forEach(function(article){
    var card=ce('div','article-card');
    if(article.coverImage){
      var img=ce('img','article-card-cover');
      img.src=toDriveImg(article.coverImage);
      img.alt='';
      img.loading='lazy';
      img.onerror=function(){this.style.display='none'};
      card.appendChild(img);
    }else{
      var ph=ce('div','card-placeholder','\uD83D\uDCDD');
      ph.style.aspectRatio='16/9';
      card.appendChild(ph);
    }
    var body=ce('div','article-card-body');
    body.appendChild(ce('div','article-card-title',esc(article.title)));
    /* Strip HTML for excerpt */
    var tmp=document.createElement('div');
    tmp.innerHTML=article.content||'';
    var excerpt=(tmp.textContent||tmp.innerText||'').substring(0,80);
    body.appendChild(ce('div','article-card-excerpt',esc(excerpt)+(excerpt.length>=80?'...':'')));
    var foot=ce('div','article-card-foot');
    foot.appendChild(ce('span','article-card-date',article.publishDate?article.publishDate.slice(0,10):''));
    var readBtn=ce('button','article-card-btn','\u95B1\u8B80\u66F4\u591A');
    readBtn.onclick=function(e){e.stopPropagation();openArticleReader(article)};
    foot.appendChild(readBtn);
    body.appendChild(foot);
    card.appendChild(body);
    card.onclick=function(){openArticleReader(article)};
    grid.appendChild(card);
  });
}

/* ====== INIT ====== */
function init(){
  initTheme();
  buildStars();

  /* 直接用預載資料渲染，秒開 */
  buildNavTabs();
  buildHeroGrid();
  updateVisit();
  initSearch();

  var hash=decodeURIComponent(location.hash.replace('#',''));
  if(hash&&PAGES.indexOf(hash)>=0){
    switchTab(hash);
  }else if(PAGES.length){
    switchTab(PAGES[0]);
  }

  /* 延遲 3 秒背景拉取最新資料（不阻塞首屏） */
  setTimeout(function(){
    gasAPI('getData',null,function(data){
      if(!data)return;
      if(data.cards&&data.cards.length)CARDS=data.cards;
      if(data.pages&&data.pages.length)PAGES=data.pages;
      if(data.gemUrl)GEM_URL=data.gemUrl;
      var _s=data.stats||{};_statsData=_s.tools||_s;_totalVisits=_s.total||0;
      if(data.articles)_articles=data.articles;
      if(data.files)_files=data.files;
      if(data.settings){
        _settings=data.settings;
        applyAnnouncement();
        applySEO();
      }
      updateVisit();renderCards();buildNavTabs();buildHeroGrid();
    });
  },3000);

  window.addEventListener('hashchange',function(){
    var hash=decodeURIComponent(location.hash.replace('#',''));
    if(hash&&PAGES.indexOf(hash)>=0&&hash!==_activeTab){
      switchTab(hash);
    }
  });
}

init();
})();
</script>
