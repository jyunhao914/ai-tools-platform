<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI 工具資源平台</title>
<meta name="description" content="AI 工具資源平台 — 整合最新 AI 科技工具">
<meta property="og:title" content="AI 工具資源平台">
<meta property="og:description" content="AI 工具資源平台 — 整合最新 AI 科技工具">
<meta property="og:image" content="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigi>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap"></noscript>
<style>
:root{
  --bg:#07090f;--bg2:#0d1220;--bg3:#111827;
  --card:rgba(255,255,255,0.042);--card-h:rgba(255,255,255,0.075);
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --accent:#38bdf8;--accent2:#818cf8;--accent3:#34d399;
  --r:12px;--r2:18px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans TC',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;line-height:1.6}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
img{display:block;max-width:100%}

/* NAV */
.nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:60px;background:rgba(7,9,15,0.82);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:17px;flex-shrink:0}
.nav-logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff}
.nav-tabs{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{padding:8px 16px;border-radius:8px;font-size:14px;font-weight:500;color:var(--text2);transition:all .2s;white-space:nowrap}
.nav-tab:hover{color:var(--text);background:var(--card)}
.nav-tab.active{color:var(--accent);background:rgba(56,189,248,0.1)}
.nav-visit{font-size:13px;color:var(--text3);white-space:nowrap;flex-shrink:0}
.student-badge{font-size:12px;color:var(--accent3);cursor:pointer;white-space:nowrap;flex-shrink:0;padding:3px 9px;border-radius:6px;background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.25);position:relative;user-select:none}
.student-badge-menu{position:absolute;top:calc(100% + 6px);right:0;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:4px;min-width:90px;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,0.4)}
.student-badge-menu button{display:block;width:100%;text-align:left;padding:7px 12px;border-radius:6px;font-size:13px;color:var(--text);background:none;border:none;cursor:pointer}
.student-badge-menu button:hover{background:var(--card)}
.perm-badge{display:inline-block;font-size:10px;padding:1px 5px;border-radius:3px;margin-left:4px;vertical-align:middle;font-weight:600}
.perm-badge.student{background:rgba(52,211,153,0.15);color:#34d399;border:1px solid rgba(52,211,153,0.3)}
.perm-badge.admin-perm{background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.3)}

/* ANNOUNCEMENT BANNER */
.announcement-banner{display:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;text-align:center;padding:10px 48px 10px 24px;font-size:14px;font-weight:500;position:relative;z-index:99}
.announcement-banner.show{display:block}
.announcement-banner .dismiss-btn{position:absolute;right:16px;top:50%;transform:translateY(-50%);background:none;border:none;color:#fff;font-size:18px;cursor:pointer;opacity:.7}
.announcement-banner .dismiss-btn:hover{opacity:1}

/* HERO */
.hero{position:relative;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 24px 60px;overflow:hidden}
.hero-bg{position:absolute;inset:0;z-index:0;pointer-events:none}
.hero-blob{position:absolute;border-radius:50%;filter:blur(120px);opacity:.18}
.hero-blob.b1{width:600px;height:600px;background:var(--accent);top:-200px;left:-100px}
.hero-blob.b2{width:500px;height:500px;background:var(--accent2);bottom:-150px;right:-80px}
.hero-blob.b3{width:400px;height:400px;background:var(--accent3);top:50%;left:60%;transform:translate(-50%,-50%)}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s)}
@keyframes twinkle{0%,100%{opacity:.1}50%{opacity:.8}}
.hero-content{position:relative;z-index:1;text-align:center;max-width:720px}
.hero-badge{display:inline-block;padding:6px 16px;border-radius:99px;font-size:13px;font-weight:600;color:var(--accent);background:rgba(56,189,248,0.1);border:1px solid rgba(56,189,248,0.2);margin-bottom:20px}
.hero-title{font-size:clamp(36px,6vw,56px);font-weight:700;line-height:1.15;margin-bottom:16px;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:clamp(15px,2.2vw,18px);color:var(--text2);max-width:520px;margin:0 auto 48px;white-space:pre-line}
.hero-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;width:100%;max-width:860px;position:relative;z-index:1}
.hero-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:28px 22px;text-align:left;cursor:pointer;transition:all .28s}
.hero-card:hover{background:var(--card-h);border-color:var(--border2);transform:translateY(-4px)}
.hero-card-ico{font-size:32px;margin-bottom:12px}
.hero-card-title{font-size:16px;font-weight:600;margin-bottom:6px}
.hero-card-desc{font-size:13px;color:var(--text2);line-height:1.5}

/* TOOLS SECTION */
.tools{padding:60px 24px 80px;max-width:1200px;margin:0 auto}
.tools-head{font-size:22px;font-weight:700;margin-bottom:28px}
.tools-head span{color:var(--accent)}
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:22px}
.tools-empty{text-align:center;padding:80px 24px;color:var(--text3);font-size:16px}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;display:flex;flex-direction:column}
.card:hover{border-color:var(--border2);background:var(--card-h)}

/* SLIDER */
.card-slider{position:relative;width:100%;aspect-ratio:16/9;background:var(--bg3);overflow:hidden}
.card-slider img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .35s}
.card-slider img.active{opacity:1}
.slider-btn{position:absolute;top:50%;transform:translateY(-50%);width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;z-index:2;opacity:0;transition:opacity .2s}
.card-slider:hover .slider-btn{opacity:1}
.slider-btn.prev{left:8px}
.slider-btn.next{right:8px}
.slider-dots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:2}
.slider-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.35);transition:background .2s}
.slider-dot.active{background:#fff}
.card-placeholder{width:100%;aspect-ratio:16/9;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:48px;color:var(--text3)}

/* CARD BODY */
.card-body{padding:18px 20px 20px;flex:1;display:flex;flex-direction:column}
.card-tag{display:inline-block;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;color:var(--accent);background:rgba(56,189,248,0.1);margin-bottom:10px;align-self:flex-start}
.card-title{font-size:16px;font-weight:600;margin-bottom:6px}
.card-desc{font-size:13px;color:var(--text2);line-height:1.55;margin-bottom:12px;flex:1;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;flex-wrap:wrap;gap:6px 12px;margin-bottom:14px}
.card-meta span{font-size:12px;color:var(--text3)}
.card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:auto}
.card-link{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2));transition:opacity .2s}
.card-link--primary{background:linear-gradient(135deg,var(--accent),var(--accent2))}
.card-link--success{background:linear-gradient(135deg,#22c55e,#16a34a)}
.card-link--warning{background:linear-gradient(135deg,#f59e0b,#d97706)}
.card-link--danger{background:linear-gradient(135deg,#ef4444,#dc2626)}
.card-link:hover{opacity:.85}
.card-views{font-size:12px;color:var(--text3)}

/* TYPE BADGE on card */
.card-type-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;margin-right:6px}
.card-type-badge.type-link{color:var(--accent);background:rgba(56,189,248,0.1)}
.card-type-badge.type-file{color:var(--accent3);background:rgba(52,211,153,0.1)}
.card-type-badge.type-article{color:var(--accent2);background:rgba(129,140,248,0.1)}

/* FOOTER */
.footer{text-align:center;padding:32px 24px;color:var(--text3);font-size:13px;border-top:1px solid var(--border)}

/* ADMIN BTN */
.admin-gear{position:fixed;bottom:24px;right:24px;width:44px;height:44px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);display:none;align-items:center;justify-content:center;font-size:20px;z-index:90;transition:transform .3s}.admin-gear.visible{display:flex}
.admin-gear:hover{transform:rotate(90deg)}
.admin-bar{position:sticky;top:0;z-index:150;background:linear-gradient(90deg,#1e40af,#7c3aed);color:#fff;padding:6px 20px;font-size:13px;display:flex;align-items:center;font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.admin-edit-btn{position:absolute;top:8px;right:8px;width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;display:none;align-items:center;justify-content:center;cursor:pointer;z-index:99;font-size:16px;box-shadow:0 2px 8px rgba(99,102,241,0.5);transition:transform 0.15s;border:2px solid rgba(255,255,255,0.3)}
.admin-edit-btn:hover{transform:scale(1.15)}
.admin-mode .admin-edit-btn{display:flex}

/* ADMIN OVERLAY */
.admin-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.admin-overlay.show{display:flex}
.admin-panel{background:#1e293b;border-radius:var(--r2);width:92vw;max-width:780px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.5)}
.admin-header{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--border2)}
.admin-header h2{font-size:18px;font-weight:700}
.admin-close{font-size:22px;color:var(--text3);cursor:pointer;transition:color .2s}
.admin-close:hover{color:var(--text)}
.admin-tabs{display:flex;gap:4px;padding:12px 24px 0;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;flex-wrap:nowrap!important}
.admin-tabs::-webkit-scrollbar{display:none}
.admin-tab{padding:8px 16px;border-radius:8px 8px 0 0;font-size:14px;font-weight:500;color:var(--text3);transition:all .2s;border-bottom:2px solid transparent;white-space:nowrap}
.admin-tab.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(56,189,248,0.06)}
.admin-body{flex:1;overflow-y:auto;padding:20px 24px}
.admin-toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.admin-search{flex:1;min-width:180px;padding:8px 14px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:14px;outline:none}
.admin-search:focus{border-color:var(--accent)}
.admin-add-btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2));transition:opacity .2s}
.admin-add-btn:hover{opacity:.8}
.admin-cat-label{font-size:14px;font-weight:600;color:var(--accent);margin:18px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.admin-cat-label:first-child{margin-top:0}
.admin-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;background:rgba(255,255,255,0.03);margin-bottom:6px;transition:background .15s}
.admin-row:hover{background:rgba(255,255,255,0.06)}
.admin-row-thumb{width:32px;height:32px;border-radius:4px;object-fit:cover;flex-shrink:0;background:var(--bg3)}
.admin-row-thumb-placeholder{width:32px;height:32px;border-radius:4px;flex-shrink:0;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text3)}
.admin-row-title{flex:1;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.admin-row-title.hidden-card{opacity:.4}
.admin-row button{padding:5px 10px;border-radius:6px;font-size:12px;background:rgba(255,255,255,0.06);color:var(--text2);transition:all .15s}
.admin-row button:hover{background:rgba(255,255,255,0.12);color:var(--text)}
.admin-row button.del{color:#f87171}
.admin-row button.del:hover{background:rgba(248,113,113,0.15)}
.link-status{font-size:11px;margin-left:4px}

/* TOGGLE */
.toggle{position:relative;width:40px;height:22px;border-radius:99px;background:#475569;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--accent3)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .2s}
.toggle.on::after{transform:translateX(18px)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal{background:#1e293b;border-radius:var(--r2);width:92vw;max-width:680px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--border2)}
.modal-head h3{font-size:16px;font-weight:700}
.modal-body{padding:20px 24px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:14px}
.modal-field label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:5px}
.modal-field input,.modal-field textarea,.modal-field select{width:100%;padding:9px 13px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:14px;font-family:inherit;outline:none}
.modal-field input:focus,.modal-field textarea:focus,.modal-field select:focus{border-color:var(--accent)}
.modal-field textarea{resize:vertical;min-height:60px}
.modal-preview{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.modal-preview img{width:80px;height:50px;object-fit:cover;border-radius:6px;border:1px solid var(--border2)}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:14px 24px;border-top:1px solid var(--border2)}
.modal-btn{padding:9px 22px;border-radius:8px;font-size:14px;font-weight:600;transition:opacity .2s}
.modal-btn.cancel{background:rgba(255,255,255,0.08);color:var(--text2)}
.modal-btn.save{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.modal-btn:hover{opacity:.8}

/* TYPE SELECTOR in modal */
.type-selector{display:flex;gap:6px;margin-bottom:4px}
.type-selector button{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;border:2px solid var(--border2);background:var(--bg3);color:var(--text2);transition:all .2s}
.type-selector button.active{border-color:var(--accent);color:var(--accent);background:rgba(56,189,248,0.08)}
.type-selector button:hover{border-color:var(--accent);color:var(--text)}

/* ADMIN LIST (admins tab) */
.admin-email-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:rgba(255,255,255,0.03);margin-bottom:6px}
.admin-email-row span{flex:1;font-size:14px}
.admin-email-row button{padding:5px 10px;border-radius:6px;font-size:12px;background:rgba(248,113,113,0.1);color:#f87171}
.admin-email-add{display:flex;gap:8px;margin-bottom:16px}
.admin-email-add input{flex:1;padding:8px 13px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:14px;outline:none}
.admin-email-add button{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;color:#fff;background:linear-gradient(135deg,var(--accent3),var(--accent))}

/* PAGES ADMIN (category tab) */
.pages-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;background:rgba(255,255,255,0.03);margin-bottom:6px}
.pages-row span{flex:1;font-size:14px}
.pages-row button{padding:5px 10px;border-radius:6px;font-size:12px;background:rgba(255,255,255,0.06);color:var(--text2);transition:all .15s}
.pages-row button:hover{background:rgba(255,255,255,0.12);color:var(--text)}
.pages-row button.del{color:#f87171}

/* STATS DASHBOARD */
.stats-big-number{font-size:48px;font-weight:700;color:var(--accent);text-align:center;margin:16px 0 8px}
.stats-big-label{font-size:14px;color:var(--text2);text-align:center;margin-bottom:24px}
.stats-section-title{font-size:15px;font-weight:600;color:var(--text);margin:20px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.stats-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.stats-bar-label{font-size:13px;color:var(--text2);min-width:120px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stats-bar-track{flex:1;height:20px;background:rgba(255,255,255,0.05);border-radius:4px;overflow:hidden}
.stats-bar-fill{height:100%;border-radius:4px;background:linear-gradient(135deg,var(--accent),var(--accent2));transition:width .3s}
.stats-bar-value{font-size:12px;color:var(--text3);min-width:40px;text-align:right}
.stats-daily-chart{display:flex;align-items:flex-end;gap:8px;height:120px;padding:12px 0;margin-bottom:8px}
.stats-daily-bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.stats-daily-bar-fill{width:100%;min-width:24px;border-radius:4px 4px 0 0;background:linear-gradient(180deg,var(--accent),var(--accent2));transition:height .3s}
.stats-daily-bar-label{font-size:10px;color:var(--text3)}
.stats-daily-bar-count{font-size:11px;color:var(--text2)}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:10px;background:#334155;color:var(--text);font-size:14px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* UPLOAD EXTRAS */
.upload-progress{width:100%;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;margin-top:8px;display:none}
.upload-progress-bar{height:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:3px;width:0%;transition:width .3s}
.upload-warn{font-size:12px;color:#fbbf24;margin-top:4px;display:none}

/* RICH TEXT EDITOR */
.rte-toolbar{display:flex;gap:4px;padding:8px;background:rgba(255,255,255,0.04);border:1px solid var(--border2);border-radius:8px 8px 0 0;flex-wrap:wrap;align-items:center}
.rte-toolbar::-webkit-scrollbar{display:none}
.rte-toolbar button{padding:6px 10px;border-radius:4px;font-size:13px;background:rgba(255,255,255,0.06);color:var(--text);border:1px solid transparent;transition:all .15s;white-space:nowrap;flex-shrink:0}
.rte-toolbar button:hover{background:rgba(255,255,255,0.12);border-color:var(--border2)}
.rte-toolbar select{padding:4px 8px;border-radius:4px;font-size:12px;background:var(--bg3);color:var(--text);border:1px solid var(--border2);outline:none;flex-shrink:0;width:auto;max-width:100px}
.rte-editor{min-height:250px;max-height:400px;overflow-y:auto;padding:16px;border:1px solid var(--border2);border-top:none;border-radius:0 0 8px 8px;background:var(--bg3);color:var(--text);font-size:14px;line-height:1.7;outline:none}
.rte-editor h2{font-size:20px;font-weight:700;margin:12px 0 8px}
.rte-editor h3{font-size:17px;font-weight:600;margin:10px 0 6px}
.rte-editor img{max-width:100%;border-radius:8px;margin:8px 0}
.rte-editor a{color:var(--accent);text-decoration:underline}
.rte-editor ul,.rte-editor ol{padding-left:24px;margin:8px 0}

/* COLOR PALETTE */
.rte-color-palette{position:fixed;z-index:100000;display:none;background:#1e293b;border:1px solid var(--border2);border-radius:8px;padding:8px;box-shadow:0 8px 24px rgba(0,0,0,.5);gap:4px;flex-wrap:wrap;width:160px}
.rte-color-palette.show{display:flex}
.rte-color-swatch{width:24px;height:24px;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:border-color .15s}
.rte-color-swatch:hover{border-color:#fff}

/* ARTICLE OVERLAY */
.article-overlay{position:fixed;inset:0;z-index:250;background:var(--bg);display:none;overflow-y:auto;animation:fadeIn .25s ease}
.article-overlay.show{display:block}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.article-reader{max-width:800px;margin:0 auto;padding:40px 24px 80px}
.article-back{position:fixed;top:70px;left:20px;padding:8px 18px;border-radius:8px;font-size:14px;font-weight:500;color:var(--text2);background:var(--card);border:1px solid var(--border);cursor:pointer;transition:all .2s;z-index:90;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.article-back:hover{color:var(--text);border-color:var(--border2);background:var(--card-h)}
.article-back-bottom{position:static!important;display:block;margin:40px auto 20px;width:fit-content}
.article-reader h1{font-size:clamp(24px,4vw,36px);font-weight:700;line-height:1.3;margin-bottom:12px}
.article-meta{font-size:13px;color:var(--text3);margin-bottom:32px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.article-content{font-size:15px;line-height:1.9;color:var(--text)}
.article-content h2{font-size:22px;font-weight:700;margin:28px 0 12px;color:var(--text)}
.article-content h3{font-size:18px;font-weight:600;margin:20px 0 10px;color:var(--text)}
.article-content p{margin-bottom:16px}
.article-content img{max-width:100%;border-radius:8px;margin:16px 0}
.article-content a{color:var(--accent);text-decoration:underline}
.article-content ul,.article-content ol{padding-left:24px;margin-bottom:16px}
.article-content li{margin-bottom:6px}
.article-content blockquote{border-left:3px solid var(--accent);padding:8px 16px;margin:16px 0;color:var(--text2);background:var(--card);border-radius:0 8px 8px 0}
.article-cover{width:100%;max-height:400px;object-fit:cover;border-radius:var(--r2);margin-bottom:24px}

/* Article TOC */
.article-toc{position:sticky;top:70px;max-height:calc(100vh - 100px);overflow-y:auto;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:20px;scrollbar-width:thin}
.article-toc-title{font-size:13px;font-weight:700;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.article-toc a{display:block;padding:4px 0;font-size:13px;color:var(--text2);text-decoration:none;transition:color .15s;border-left:2px solid transparent;padding-left:8px}
.article-toc a:hover{color:var(--accent)}
.article-toc a.active{color:var(--accent);border-left-color:var(--accent)}
.article-toc a.toc-h3{padding-left:20px;font-size:12px}
.article-reader-wrap{display:flex;gap:24px;max-width:1100px;margin:0 auto;padding:40px 24px 80px}
.article-reader-main{flex:1;min-width:0}
.article-reader-side{width:220px;flex-shrink:0}
@media(max-width:900px){
  .article-reader-wrap{flex-direction:column}
  .article-reader-side{width:100%;position:static}
  .article-toc{position:static;max-height:200px}
}

/* Article share link */
.article-share{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;font-size:12px;color:var(--text2);background:var(--card);border:1px solid var(--border);cursor:pointer;transition:all .15s;margin-left:12px}
.article-share:hover{color:var(--accent);border-color:var(--accent)}

/* Article preview button in editor */
.preview-article-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;color:var(--accent);background:rgba(56,189,248,0.1);border:1px solid rgba(56,189,248,0.2);cursor:pointer;transition:all .15s;margin-right:8px}
.preview-article-btn:hover{background:rgba(56,189,248,0.2)}

/* Autosave indicator */
.autosave-indicator{font-size:11px;color:var(--text3);padding:4px 8px}
.autosave-indicator.saved{color:var(--accent3)}

/* Mobile editor toolbar */
@media(max-width:600px){
  .rte-toolbar button{padding:8px 10px;font-size:14px;min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center}
  .rte-toolbar select{padding:6px 8px;font-size:13px;min-height:36px}
  .rte-toolbar{gap:4px;padding:8px}
}

/* DRAG AND DROP */
.admin-row[draggable="true"]{cursor:grab}
.admin-row[draggable="true"]:active{cursor:grabbing}
.admin-row.dragging{opacity:0.4}
.admin-row.drag-over{border-top:2px solid #38bdf8}
.admin-row .reorder-btn{padding:3px 6px;font-size:10px;min-width:24px}

/* BATCH TOOLBAR */
.batch-toolbar{display:none;position:sticky;top:0;z-index:10;padding:10px 14px;margin:-20px -24px 16px;background:linear-gradient(135deg,rgba(56,189,248,0.12),rgba(129,140,248,0.12));backdrop-filter:blur(8px);border-bottom:1px solid var(--border2);align-items:center;gap:8px;flex-wrap:wrap}
.batch-toolbar.show{display:flex}
.batch-toolbar .batch-count{font-size:13px;font-weight:600;color:var(--accent);margin-right:4px}
.batch-toolbar button{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:500;background:rgba(255,255,255,0.08);color:var(--text);border:1px solid var(--border2);transition:all .15s}
.batch-toolbar button:hover{background:rgba(255,255,255,0.15);border-color:var(--accent)}
.batch-toolbar button.batch-del{color:#f87171;border-color:rgba(248,113,113,0.3)}
.batch-toolbar button.batch-del:hover{background:rgba(248,113,113,0.15)}
.batch-toolbar .batch-cancel{color:var(--text3)}

/* BATCH CHECKBOX */
.admin-row-checkbox{width:18px;height:18px;border-radius:4px;border:2px solid var(--border2);background:transparent;cursor:pointer;flex-shrink:0;appearance:none;-webkit-appearance:none;transition:all .15s;position:relative}
.admin-row-checkbox:checked{background:var(--accent);border-color:var(--accent)}
.admin-row-checkbox:checked::after{content:'\2713';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:12px;font-weight:700}

/* BATCH MOVE DROPDOWN */
.batch-move-wrap{position:relative;display:inline-block}
.batch-move-dropdown{position:absolute;top:100%;left:0;margin-top:4px;background:#1e293b;border:1px solid var(--border2);border-radius:8px;padding:4px;min-width:140px;z-index:20;box-shadow:0 8px 24px rgba(0,0,0,.3)}
.batch-move-dropdown button{display:block;width:100%;text-align:left;padding:6px 12px;border-radius:4px;font-size:13px;color:var(--text);border:none;background:none}
.batch-move-dropdown button:hover{background:rgba(255,255,255,0.08)}

/* OPERATION LOG */
.admin-log-panel{max-height:400px;overflow-y:auto}
.log-entry{display:flex;gap:10px;padding:8px 12px;border-radius:6px;margin-bottom:4px;font-size:13px;background:rgba(255,255,255,0.02);align-items:baseline}
.log-entry:hover{background:rgba(255,255,255,0.05)}
.log-time{font-family:'SF Mono',SFMono-Regular,Consolas,'Liberation Mono',Menlo,monospace;font-size:12px;color:var(--text3);white-space:nowrap;flex-shrink:0}
.log-who{font-size:12px;color:var(--text2);min-width:50px;flex-shrink:0}
.log-action{font-size:12px;font-weight:600;padding:2px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.log-action.act-create{color:#34d399;background:rgba(52,211,153,0.1)}
.log-action.act-edit{color:#38bdf8;background:rgba(56,189,248,0.1)}
.log-action.act-delete{color:#f87171;background:rgba(248,113,113,0.1)}
.log-action.act-other{color:var(--text3);background:rgba(255,255,255,0.05)}
.log-target{font-size:12px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* SEARCH BAR */
.global-search-wrap{display:flex;align-items:center;margin-left:auto;margin-right:12px}
.global-search{width:180px;padding:6px 14px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:13px;outline:none;transition:border-color .2s,width .2s}
.global-search:focus{border-color:var(--accent);width:220px}
.global-search::placeholder{color:var(--text3)}
.mobile-search-wrap{display:none}

/* THEME TOGGLE */
.theme-toggle{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;background:var(--card);border:1px solid var(--border);transition:all .2s;flex-shrink:0;margin-left:8px}
.theme-toggle:hover{background:var(--card-h);border-color:var(--border2)}

/* ABOUT SECTION */
.about-section{max-width:680px;margin:0 auto;padding:40px 0}
.about-section h3{font-size:26px;font-weight:700;margin-bottom:20px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.about-section p{font-size:15px;color:var(--text2);line-height:1.8;margin-bottom:24px}
.about-section h4{font-size:18px;font-weight:600;margin-bottom:12px;color:var(--text)}
.about-section ul{list-style:none;padding:0;margin-bottom:28px}
.about-section ul li{font-size:14px;color:var(--text2);line-height:1.8;padding-left:8px}
.about-section .about-contact{padding:20px 24px;border-radius:var(--r2);background:var(--card);border:1px solid var(--border);font-size:14px;color:var(--text2);line-height:1.8}
.about-section .about-contact a{color:var(--accent);text-decoration:underline}

/* LOADING */
.loading-placeholder{display:flex;align-items:center;justify-content:center;padding:80px 24px;color:var(--text3);font-size:15px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin-right:10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* SCROLL ANIMATION */
.card{opacity:0;transform:translateY(20px);transition:opacity 0.4s ease,transform 0.4s ease}
.card.visible{opacity:1;transform:translateY(0)}
.card.visible:hover{transform:translateY(-3px)}

/* LIGHT THEME */
[data-theme="light"]{
  --bg:#f8fafc;--bg2:#ffffff;--bg3:#f1f5f9;
  --card:rgba(0,0,0,0.03);--card-h:rgba(0,0,0,0.06);
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.12);
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;
}
[data-theme="light"] .nav{background:rgba(248,250,252,0.88);border-bottom-color:rgba(0,0,0,0.08)}
[data-theme="light"] .hero-title{background:linear-gradient(135deg,#0f172a 30%,var(--accent));-webkit-background-clip:text;background-clip:text}
[data-theme="light"] .hero-blob{opacity:.08}
[data-theme="light"] .star{background:#94a3b8}
[data-theme="light"] .admin-panel{background:#ffffff}
[data-theme="light"] .modal{background:#ffffff}
[data-theme="light"] .footer{border-top-color:rgba(0,0,0,0.08)}
[data-theme="light"] .toast{background:#e2e8f0;color:#0f172a}
[data-theme="light"] .admin-row{background:rgba(0,0,0,0.02)}
[data-theme="light"] .admin-row:hover{background:rgba(0,0,0,0.04)}
[data-theme="light"] .slider-dot{background:rgba(0,0,0,.25)}
[data-theme="light"] .slider-dot.active{background:#0f172a}
[data-theme="light"] .batch-toolbar{background:linear-gradient(135deg,rgba(56,189,248,0.08),rgba(129,140,248,0.08))}
[data-theme="light"] .batch-toolbar button{background:rgba(0,0,0,0.04);color:var(--text);border-color:var(--border2)}
[data-theme="light"] .admin-row-checkbox{border-color:var(--border2)}
[data-theme="light"] .batch-move-dropdown{background:#fff;box-shadow:0 8px 24px rgba(0,0,0,.1)}
[data-theme="light"] .batch-move-dropdown button:hover{background:rgba(0,0,0,0.04)}
[data-theme="light"] .log-entry{background:rgba(0,0,0,0.02)}
[data-theme="light"] .log-entry:hover{background:rgba(0,0,0,0.04)}
[data-theme="light"] .rte-color-palette{background:#fff}

/* RESPONSIVE */
@media(max-width:600px){
  .nav{padding:0 10px;height:52px;gap:6px}
  .nav-logo{font-size:15px}
  .nav-logo-icon{width:28px;height:28px;font-size:15px}
  .nav-tabs{overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;flex-shrink:1;min-width:0}
  .nav-tabs::-webkit-scrollbar{display:none}
  .nav-tab{padding:6px 10px;font-size:12px}
  .nav-visit{display:block;font-size:11px;position:absolute;right:50px;top:4px}
  .global-search-wrap{display:none}
  .mobile-search-wrap{display:block}
  .hero{padding:48px 14px 32px;min-height:auto}
  .hero-title{font-size:28px}
  .hero-sub{font-size:14px;margin-bottom:32px}
  .hero-grid{grid-template-columns:1fr;gap:10px}
  .hero-card{padding:16px 14px}
  .hero-card-ico{font-size:24px;margin-bottom:8px}
  .hero-card-title{font-size:14px}
  .hero-card-desc{font-size:12px}
  .tools{padding:24px 10px 48px}
  .tools-head{font-size:18px;margin-bottom:20px}
  .tools-grid{grid-template-columns:1fr;gap:16px}
  .card-body{padding:14px 16px 16px}
  .article-back{top:58px;left:10px;padding:6px 12px;font-size:12px}
  .admin-panel{width:100vw;max-width:100vw;max-height:100vh;border-radius:0}
  .modal{width:98vw}
  .about-section{padding:24px 0}
  .about-section h3{font-size:22px}
  .theme-toggle{width:32px;height:32px;font-size:16px;margin-left:4px}
}
/* === Back to Top Button === */
.back-to-top{position:fixed;bottom:24px;right:24px;z-index:200;width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:20px;border:none;cursor:pointer;opacity:0;visibility:hidden;transition:all .3s;box-shadow:0 4px 12px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center}
.back-to-top.show{opacity:1;visibility:visible}
.back-to-top:hover{transform:translateY(-3px);box-shadow:0 6px 16px rgba(0,0,0,.4)}

/* === Card Entrance Animation === */
.card{opacity:0;transform:translateY(24px);transition:opacity .45s ease,transform .45s ease}
.card.card-visible{opacity:1;transform:translateY(0)}

/* === Skeleton Loading === */
.skeleton-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.skeleton-card .sk-img{width:100%;aspect-ratio:16/9;background:linear-gradient(90deg,var(--bg3) 25%,rgba(255,255,255,0.06) 50%,var(--bg3) 75%);background-size:200% 100%;animation:skShimmer 1.5s infinite}
.skeleton-card .sk-body{padding:18px 20px}
.skeleton-card .sk-line{height:14px;border-radius:4px;background:linear-gradient(90deg,var(--bg3) 25%,rgba(255,255,255,0.06) 50%,var(--bg3) 75%);background-size:200% 100%;animation:skShimmer 1.5s infinite;margin-bottom:10px}
.skeleton-card .sk-line.short{width:60%}
.skeleton-card .sk-line.medium{width:80%}
@keyframes skShimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* === Print Friendly === */
@media print{
  .nav,.hero,.footer,.admin-gear,.admin-overlay,.back-to-top,.article-back,.article-share,.article-reader-side,.toast{display:none!important}
  .article-overlay{position:static!important;display:block!important;background:#fff!important}
  .article-reader-wrap{max-width:100%!important;padding:0!important}
  .article-content{color:#000!important;font-size:13px!important;line-height:1.7!important}
  .article-content h2,.article-content h3{color:#000!important}
  .article-content a{color:#0066cc!important}
  .article-content img{max-width:100%!important;break-inside:avoid}
  .article-content table{border-color:#ccc!important}
  .article-content table th,.article-content table td{border-color:#ccc!important;background:#fff!important;color:#000!important}
  .inline-copy-btn{border-color:#ccc!important}
  .inline-copy-btn .icb-preview{background:#f5f5f5!important;color:#333!important}
}

/* === Reading Time === */
.article-reading-time{font-size:12px;color:var(--text3);margin-left:8px}

/* === Font Size Control === */
.article-font-ctrl{display:inline-flex;gap:4px;margin-left:auto}
.article-font-ctrl button{width:30px;height:30px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.article-font-ctrl button:hover{border-color:var(--accent);color:var(--accent)}

/* === Video Embed === */
.rte-video-wrap,.article-content .rte-video-wrap{position:relative;width:100%;padding-bottom:56.25%;margin:16px 0;border-radius:var(--r);overflow:hidden;background:#000}
.rte-video-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
.rte-video-wrap .video-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:14px;background:var(--bg3)}

/* === QR Code Modal === */
.qr-modal-overlay{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center}
.qr-modal-overlay.show{display:flex}
.qr-modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2);padding:28px;text-align:center;min-width:280px}
.qr-modal h3{font-size:16px;font-weight:700;margin-bottom:16px}
.qr-modal canvas{margin:0 auto 16px;display:block;border-radius:8px}
.qr-modal .qr-url{font-size:11px;color:var(--text3);word-break:break-all;margin-bottom:16px;max-width:250px;margin-left:auto;margin-right:auto}
.qr-modal button{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:var(--card);color:var(--text);transition:all .15s}

/* === Copy Card === */
.card-copy-preview{background:rgba(0,0,0,0.18);border-radius:8px;padding:10px 12px;margin:8px 0;font-family:'Fira Code','Courier New',monospace;font-size:0.78rem;color:#a6e3a1;max-height:80px;overflow:hidden;white-space:pre-wrap;word-break:break-all;position:relative;border:1px solid rgba(255,255,255,0.08)}
.card-copy-preview::after{content:'';position:absolute;bottom:0;left:0;right:0;height:24px;background:linear-gradient(transparent,rgba(0,0,0,0.18))}
[data-theme="light"] .card-copy-preview{background:rgba(0,0,0,0.05);color:#15803d;border-color:rgba(0,0,0,0.08)}
[data-theme="light"] .card-copy-preview::after{background:linear-gradient(transparent,rgba(0,0,0,0.05))}

/* === Inline Copy Button (article embedded) === */
.inline-copy-btn{margin:16px 0;border-radius:var(--r);border:1px solid var(--border2);overflow:hidden;user-select:none}
.inline-copy-btn .icb-preview{padding:10px 14px;font-size:0.82rem;line-height:1.6;max-height:120px;overflow:hidden;white-space:pre-wrap;word-break:break-all;position:relative;color:var(--text2);background:rgba(0,0,0,0.15);border-bottom:1px solid var(--border)}
.inline-copy-btn .icb-preview.expandable::after{content:'';position:absolute;bottom:0;left:0;right:0;height:28px;background:linear-gradient(transparent,rgba(0,0,0,0.18));pointer-events:none}
.inline-copy-btn .icb-preview.expanded{max-height:none}
.inline-copy-btn .icb-preview.expanded::after{display:none}
.inline-copy-btn .icb-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:var(--card)}
.inline-copy-btn .icb-bar .icb-label{font-size:12px;color:var(--text3)}
.inline-copy-btn .icb-bar .icb-action{display:inline-flex;align-items:center;gap:5px;padding:6px 16px;border-radius:8px;font-size:13px;font-weight:600;color:#fff;border:none;cursor:pointer;transition:opacity .2s}
.inline-copy-btn .icb-bar .icb-action:hover{opacity:.85}
.icb-delete-hint{position:absolute;top:4px;right:8px;font-size:14px;cursor:pointer;opacity:.4;transition:opacity .2s}
.icb-delete-hint:hover{opacity:1}
.inline-copy-btn .icb-bar .icb-action.style-primary{background:linear-gradient(135deg,var(--accent),var(--accent2))}
.inline-copy-btn .icb-bar .icb-action.style-success{background:linear-gradient(135deg,#22c55e,#16a34a)}
.inline-copy-btn .icb-bar .icb-action.style-warning{background:linear-gradient(135deg,#f59e0b,#d97706)}

<script>
(function(){
/* ====== POLYFILLS for old browsers ====== */
if(!NodeList.prototype.forEach){NodeList.prototype.forEach=Array.prototype.forEach;}
if(!String.prototype.startsWith){String.prototype.startsWith=function(s,p){p=p||0;return this.indexOf(s,p)===p;};}
if(!Element.prototype.closest){Element.prototype.closest=function(sel){var el=this;while(el&&el.nodeType===1){if(el.matches(sel))return el;el=el.parentElement;}return null;};}
if(!Element.prototype.matches){Element.prototype.matches=Element.prototype.msMatchesSelector||Element.prototype.webkitMatchesSelector||function(s){var m=this.ownerDocument.querySelectorAll(s);for(var i=0;i<m.length;i++){if(m[i]===this)return true;}return false;};}

/* ====== CONFIG ====== */
var GAS_API='https://script.google.com/macros/s/AKfycbx6qfQFbhAwiqA4AdRisH2HuZDw8iLQEEw-pxraTYCCoMInj0O9cpygBSsB6ii32j21/exec';
var _cbId=0;
var CARDS=[];
var PAGES=[];
var GEM_URL="https://gemini.google.com/gem/1-I-HEXLdgeStt9PmL-dla2q8Blq3Omop?usp=sharing";
var _statsData={};
var _totalVisits=0;
var _activeTab='';
var _adminCards=[];
var _adminEmails=[];
var _adminTab='cards';
var _editCard=null;
var _editType='article';
var _settings={};
var _userRole='public'; /* 'public'|'student'|'admin' */

var HERO_META=[
  {ico:'\uD83D\uDCCA',desc:'AI \u7C21\u5831\u751F\u6210\u5DE5\u5177\uFF0C\u4E00\u9375\u88FD\u4F5C\u7CBE\u7F8E\u6295\u5F71\u7247'},
  {ico:'\uD83C\uDFA8',desc:'\u6D77\u5831\u8A2D\u8A08\u5DE5\u5177\uFF0C\u5FEB\u901F\u7522\u51FA\u8996\u89BA\u5167\u5BB9'},
  {ico:'\uD83E\uDDF0',desc:'\u5404\u985E AI \u5DE5\u5177\u6574\u5408\uFF0C\u63D0\u5347\u5DE5\u4F5C\u6548\u7387'},
  {ico:'\uD83C\uDFE5',desc:'\u95DC\u65BC\u672C\u5E73\u53F0\u8207 AI \u63A8\u5EE3\u8A08\u756B'}
];

/* ====== JSONP ====== */
function gasAPI(action,params,callback){
  var url=GAS_API+'?action='+encodeURIComponent(action);
  var pw=sessionStorage.getItem('admin_pw')||'';
  var stok=localStorage.getItem('student_token')||'';
  if(pw){if(!params)params={};if(!params.pw)params.pw=pw;}
  else if(stok){if(!params)params={};if(!params.token)params.token=stok;}
  if(params){for(var k in params){if(params.hasOwnProperty(k)){url+='&'+encodeURIComponent(k)+'='+encodeURIComponent(params[k])}}}
  var cbName='_gcb_'+(++_cbId);
  var done=false;
  var timer=setTimeout(function(){if(!done){done=true;delete window[cbName];if(callback)callback(null)}},12000);
  window[cbName]=function(data){
    if(!done){done=true;clearTimeout(timer);delete window[cbName];
      if(data&&data.error==='token_expired'){disableStudentMode();showStudentLogin();}
      if(callback)callback(data);
    }
  };
  var s=document.createElement('script');
  s.src=url+'&callback='+cbName;
  s.onerror=function(){if(!done){done=true;clearTimeout(timer);delete window[cbName];if(callback)callback(null)}};
  document.head.appendChild(s);
}

/* POST version for large payloads (articles with images) */
function gasAPIPost(action,params,callback){
  var pw=sessionStorage.getItem('admin_pw')||'';
  var stok=localStorage.getItem('student_token')||'';
  if(!params)params={};
  params.action=action;
  if(pw)params.pw=pw;
  else if(stok)params.token=stok;
  var done=false;
  var timer=setTimeout(function(){if(!done){done=true;if(callback)callback(null)}},30000);
  /* Use form POST via hidden iframe — all fields as hidden inputs */
  var frameName='_gasPostFrame';
  var iframe=document.getElementById(frameName);
  if(!iframe){iframe=document.createElement('iframe');iframe.id=frameName;iframe.name=frameName;iframe.style.display='none';document.body.appendChild(iframe)}
  var form=document.createElement('form');
  form.method='POST';form.action=GAS_API;form.target=frameName;form.style.display='none';
  for(var k in params){if(params.hasOwnProperty(k)){var inp=document.createElement('input');inp.type='hidden';inp.name=k;inp.value=params[k];form.appendChild(inp)}}
  document.body.appendChild(form);
  form.submit();
  document.body.removeChild(form);
  /* Can't read cross-origin iframe response, wait then verify via GET */
  setTimeout(function(){
    if(done)return;done=true;clearTimeout(timer);
    if(callback)callback({ok:true});
  },4000);
}

/* ====== STUDENT AUTH ====== */
function gasLogin(username,password,callback){
  var fd=new URLSearchParams();
  fd.set('action','login');fd.set('username',username);fd.set('password',password);
  var xhr=new XMLHttpRequest();
  xhr.open('POST',GAS_API,true);
  xhr.setRequestHeader('Content-Type','application/x-www-form-urlencoded');
  xhr.onload=function(){
    try{var j=xhr.responseText.match(/\{[\s\S]*\}/);if(j){callback(JSON.parse(j[0]));return;}}catch(e){}
    callback(null);
  };
  xhr.onerror=function(){callback(null)};
  xhr.send(fd.toString());
}

function enableStudentMode(token){
  _userRole='student';
  localStorage.setItem('student_token',token);
  var badge=$('studentBadge');
  if(badge)badge.style.display='';
  renderCards();
}

function disableStudentMode(){
  _userRole='public';
  localStorage.removeItem('student_token');
  var badge=$('studentBadge');
  if(badge)badge.style.display='none';
  var menu=document.getElementById('studentBadgeMenu');
  if(menu)menu.remove();
  renderCards();
}

function showStudentLogin(){

/* ====== UTILS ====== */
function $(id){return document.getElementById(id)}
function ce(tag,cls,html){var el=document.createElement(tag);if(cls)el.className=cls;if(html!==undefined)el.innerHTML=html;return el}

function toDriveImg(url){
  if(!url)return'';
  var m=url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if(m)return'https://lh3.googleusercontent.com/d/'+m[1];
  m=url.match(/id=([a-zA-Z0-9_-]+)/);
  if(m)return'https://lh3.googleusercontent.com/d/'+m[1];
  return url;
}

function parseImgSpec(raw){
  if(!raw)return null;
  var parts=raw.split('|');
  var url=toDriveImg(parts[0].trim());
  var fit=parts[1]?parts[1].trim():'cover';
  var pos=parts[2]?parts[2].trim():'center';
  return{url:url,fit:fit,pos:pos};
}

function toast(msg){
  var t=$('toast');
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid=setTimeout(function(){t.classList.remove('show')},2200);
}

function totalViews(){
  var n=0;
  if(_statsData){for(var k in _statsData){if(_statsData.hasOwnProperty(k))n+=(parseInt(_statsData[k])||0)}}
  return n;
}

function fileIcon(mimeType){
  if(!mimeType)return'\uD83D\uDCC4';
  if(mimeType.indexOf('image')>=0)return'\uD83D\uDDBC\uFE0F';
  if(mimeType.indexOf('pdf')>=0)return'\uD83D\uDCD5';
  if(mimeType.indexOf('presentation')>=0||mimeType.indexOf('ppt')>=0)return'\uD83D\uDCCA';
  if(mimeType.indexOf('word')>=0||mimeType.indexOf('doc')>=0)return'\uD83D\uDCC4';
  if(mimeType.indexOf('text')>=0)return'\uD83D\uDCDD';
  return'\uD83D\uDCC1';
}

function typeBadge(type){
  if(type==='file')return'\uD83D\uDCC1 ';
  if(type==='article')return'\uD83D\uDCDD ';
  if(type==='copy')return'\uD83D\uDCCB ';
  return'\uD83D\uDD17 ';
}

function typeLabel(type){
  if(type==='file')return'\u6A94\u6848';
  if(type==='article')return'\u6587\u7AE0';
  if(type==='copy')return'\u8907\u88FD\u6309\u9215';
  return'\u9023\u7D50';
}

/* ====== CARD RENDERING ====== */
function esc(s){
  if(!s)return'';
  var d=document.createElement('div');
  d.textContent=s;
  return d.innerHTML;
}

function getCardImages(card){
  var imgs=[];
  var raw=card.imageUrl||card.imageUrls;
  if(!raw)return imgs;
  var lines=Array.isArray(raw)?raw:(typeof raw==='string'?raw.split('\n'):[]);
  lines.forEach(function(line){
    var trimmed=(typeof line==='string')?line.trim():'';
    if(trimmed)imgs.push(parseImgSpec(trimmed));
  });
  return imgs.filter(Boolean);
}

function buildSlider(imgs,card){
  if(!imgs.length){
    var ph=ce('div','card-placeholder',card.iconUrl?'<img src="'+esc(toDriveImg(card.iconUrl))+'" style="width:64px;height:64px;object-fit:contain;margin:auto">':'\uD83D\uDDBC');
    return ph;
  }
  var wrap=ce('div','card-slider');
  var idx=0;
  imgs.forEach(function(spec,i){
    var img=ce('img');
    img.src=spec.url;
    img.alt='';
    img.loading='lazy';
    img.decoding='async';
    img.style.objectFit=spec.fit;
    img.style.objectPosition=spec.pos;
    if(i===0)img.classList.add('active');
    wrap.appendChild(img);
  });
  if(imgs.length>1){
    var prev=ce('button','slider-btn prev','&#8249;');
    var next=ce('button','slider-btn next','&#8250;');
    prev.onclick=function(e){e.stopPropagation();slide(-1)};
    next.onclick=function(e){e.stopPropagation();slide(1)};
    wrap.appendChild(prev);
    wrap.appendChild(next);
    var dots=ce('div','slider-dots');
    imgs.forEach(function(_,i){
      var dot=ce('div','slider-dot'+(i===0?' active':''));
      dot.onclick=function(e){e.stopPropagation();goSlide(i)};
      dots.appendChild(dot);
    });
    wrap.appendChild(dots);
  }
  function slide(dir){
    var all=wrap.querySelectorAll('img');
    all[idx].classList.remove('active');
    idx=(idx+dir+all.length)%all.length;
    all[idx].classList.add('active');
    updateDots();
  }
  function goSlide(i){
    var all=wrap.querySelectorAll('img');
    all[idx].classList.remove('active');
    idx=i;
    all[idx].classList.add('active');
    updateDots();
  }
  function updateDots(){
    var dd=wrap.querySelectorAll('.slider-dot');
    dd.forEach(function(d,i){d.classList.toggle('active',i===idx)});
  }
  return wrap;
}

function renderCards(){
  if(_searchActive)return;
  var grid=$('toolsGrid');
  grid.innerHTML='';
  if(_activeTab==='\u95DC\u65BC\u6211\u5011'){
    renderAboutPage();
    return;
  }
  var filtered=CARDS.filter(function(c){
    if((c.page||c.category)!==_activeTab||c.visible===false)return false;
    var perm=c.permission||'public';
    if(perm==='student'&&_userRole==='public')return false;
    if(perm==='admin'&&_userRole!=='admin')return false;
    return true;
  });
  if(!filtered.length){
    grid.innerHTML='<div class="tools-empty">\uD83D\uDD0D \u6B64\u5206\u985E\u66AB\u7121\u5167\u5BB9</div>';
    return;
  }
  filtered.forEach(function(card){
    var type=card.type||'link';
    if(type==='article'){
      renderOneArticleCard(grid,card);
    }else if(type==='file'){
      renderOneFileCard(grid,card);
    }else{
      renderOneLinkCard(grid,card);
    }
  });

  $('toolsHead').innerHTML=esc(_activeTab)+' <span>\u2014 \u5217\u8868\uFF08'+filtered.length+' \u9805\uFF09</span>';
  observeCards();
}

/* ====== CLICK TRACKING ====== */
function trackClick(title,viewsSpan){
  /* Immediately update local count */
  if(!_statsData)_statsData={};
  _statsData[title]=(_statsData[title]||0)+1;
  if(viewsSpan)viewsSpan.textContent='\uD83D\uDC41 '+_statsData[title]+' \u6B21\u9EDE\u95B1';
  /* Send to backend */
  gasAPI('recordClick',{title:title},null);
}

/* ====== VIDEO EMBED URL ====== */
function toEmbedUrl(url){
  if(!url)return'';
  /* YouTube */
  var yt=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
  if(yt)return'https://www.youtube.com/embed/'+yt[1];
  /* Vimeo */
  var vm=url.match(/vimeo\.com\/(\d+)/);
  if(vm)return'https://player.vimeo.com/video/'+vm[1];
  /* Google Drive video */
  var gd=url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
  if(gd)return'https://drive.google.com/file/d/'+gd[1]+'/preview';
  return url;
}

/* ====== QR CODE GENERATOR (minimal canvas-based) ====== */
function showQrCode(text){
  var overlay=$('qrOverlay');
  $('qrUrl').textContent=text;
  overlay.classList.add('show');
  /* Use external QR lib via CDN (qrcode-generator) */
  if(typeof qrcode==='undefined'){
    var s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js';
    s.onload=function(){renderQr(text)};
    document.head.appendChild(s);
  }else{
    renderQr(text);
  }
}
function renderQr(text){
  var qr=qrcode(0,'M');
  qr.addData(text);
  qr.make();
  var canvas=$('qrCanvas');
  var ctx=canvas.getContext('2d');
  var size=qr.getModuleCount();
  var scale=Math.max(4,Math.floor(220/size));
  canvas.width=size*scale;
  canvas.height=size*scale;
  ctx.fillStyle='#fff';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#000';
  for(var r=0;r<size;r++){for(var c=0;c<size;c++){if(qr.isDark(r,c))ctx.fillRect(c*scale,r*scale,scale,scale)}}
}

/* ====== IMAGE COMPRESSION ====== */
function compressImage(file,callback,maxW,quality){
  maxW=maxW||800;
  quality=quality||0.7;
  var reader=new FileReader();
  reader.onload=function(ev){
    var img=new Image();
    img.onload=function(){
      var w=img.width,h=img.height;
      if(w>maxW){h=Math.round(h*(maxW/w));w=maxW}
      var canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      var ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      var dataUrl=canvas.toDataURL('image/jpeg',quality);
      callback(dataUrl);
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

function insertCompressedImage(file,altText){
  altText=altText||'uploaded image';
  toast('圖片上傳中...');
  compressImage(file,function(dataUrl){
    /* Upload compressed image to Google Drive via uploadFile doPost */
    var base64Data=dataUrl.split(',')[1];
    var pw=sessionStorage.getItem('admin_pw')||'';
    var fileName='article_img_'+Date.now()+'.jpg';

    /* Use XMLHttpRequest to POST to Apps Script (form-encoded) */
    var formData=new URLSearchParams();
    formData.set('action','uploadFile');
    formData.set('pw',pw);
    formData.set('fileData',base64Data);
    formData.set('fileName',fileName);
    formData.set('mimeType','image/jpeg');

    var xhr=new XMLHttpRequest();
    xhr.open('POST',GAS_API,true);
    xhr.setRequestHeader('Content-Type','application/x-www-form-urlencoded');
    xhr.onload=function(){
      try{
        var text=xhr.responseText;
        var json=text.match(/\{[\s\S]*\}/);
        if(json){
          var res=JSON.parse(json[0]);
          if(res.ok&&res.directUrl){
            var ed=$('articleEditor');
            if(ed)ed.focus();
            document.execCommand('insertHTML',false,'<img src="'+res.directUrl+'" style="max-width:100%;border-radius:8px;margin:8px 0" alt="'+altText+'">');
            toast('圖片已插入');
            return;
          }
        }
        toast('\u274C \u5716\u7247\u4E0A\u50B3\u5931\u6557\uFF0C\u8ACB\u91CD\u8A66');
      }catch(e){
        toast('\u274C \u5716\u7247\u4E0A\u50B3\u5931\u6557\uFF0C\u8ACB\u91CD\u8A66');
      }
    };
    xhr.onerror=function(){
      toast('\u274C \u5716\u7247\u4E0A\u50B3\u5931\u6557\uFF0C\u8ACB\u91CD\u8A66');
    };
    xhr.send(formData.toString());
  });
}

/* Build Table of Contents from H2/H3 */
function buildArticleToc(){
  var content=$('articleContent');
  var tocLinks=$('articleTocLinks');
  var toc=$('articleToc');
  tocLinks.innerHTML='';
  var headings=content.querySelectorAll('h2,h3');
  if(headings.length<2){toc.style.display='none';return}
  toc.style.display='';
  headings.forEach(function(h,i){
    h.id='toc-'+i;
    var a=document.createElement('a');
    a.href='#toc-'+i;
    a.textContent=h.textContent;
    if(h.tagName==='H3')a.className='toc-h3';
    a.onclick=function(e){
      e.preventDefault();
      h.scrollIntoView({behavior:'smooth',block:'start'});
    };
    tocLinks.appendChild(a);
  });
  /* Highlight active TOC item on scroll */
  var articleOverlay=$('articleOverlay');
  articleOverlay.onscroll=function(){
    var scrollTop=articleOverlay.scrollTop;
    var active=null;
    headings.forEach(function(h){if(h.offsetTop<=scrollTop+100)active=h});
    tocLinks.querySelectorAll('a').forEach(function(a){
      a.classList.toggle('active',active&&a.getAttribute('href')==='#'+active.id);
    });
  };
}

/* ====== CARD ENTRANCE ANIMATION ====== */
function observeCards(){
  var cards=document.querySelectorAll('.card:not(.card-visible)');
  if(!('IntersectionObserver' in window)){cards.forEach(function(c){c.classList.add('card-visible')});return}
  var obs=new IntersectionObserver(function(entries){
    entries.forEach(function(en){
      if(en.isIntersecting){en.target.classList.add('card-visible');obs.unobserve(en.target)}
    });
  },{threshold:0.08});
  cards.forEach(function(c){obs.observe(c)});
}

  toolbar.appendChild(search);

  var linkCheckBtn=ce('button','admin-add-btn','\uD83D\uDD17 \u6AA2\u67E5\u9023\u7D50');
  linkCheckBtn.style.cssText='font-size:13px';
  linkCheckBtn.onclick=function(){checkAllLinks()};
  toolbar.appendChild(linkCheckBtn);

  var exportBtn=ce('button','admin-add-btn','\uD83D\uDCBE \u532F\u51FA');
  exportBtn.style.cssText='font-size:13px';
  exportBtn.onclick=function(){exportCards()};
  toolbar.appendChild(exportBtn);

  var importBtn=ce('button','admin-add-btn','\uD83D\uDCBE \u532F\u5165');
  importBtn.style.cssText='font-size:13px';
  importBtn.onclick=function(){importInput.click()};
  toolbar.appendChild(importBtn);
  var importInput=ce('input');
  importInput.type='file';
  importInput.accept='.json';
  importInput.style.display='none';
  importInput.onchange=function(e){importCards(e)};
  toolbar.appendChild(importInput);

  var announceBtn=ce('button','admin-add-btn','\uD83D\uDCE2 \u516C\u544A');
  announceBtn.style.cssText='font-size:13px';
  announceBtn.onclick=function(){openAnnouncementModal()};
  toolbar.appendChild(announceBtn);

  var seoBtn=ce('button','admin-add-btn','\uD83D\uDD0D SEO');
  seoBtn.style.cssText='font-size:13px';
  seoBtn.onclick=function(){openSEOModal()};
  toolbar.appendChild(seoBtn);

  var siteBtn=ce('button','admin-add-btn','✏ 基本資料');
  siteBtn.style.cssText='font-size:13px';
  siteBtn.onclick=function(){openSiteInfoModal()};
  toolbar.appendChild(siteBtn);

  body.appendChild(toolbar);

  var groups={};
  PAGES.forEach(function(p){groups[p]=[]});
  _adminCards.forEach(function(c){
    if(!groups[c.page])groups[c.page]=[];
    if(filter){
      var q=filter.toLowerCase();
      if((c.title||'').toLowerCase().indexOf(q)<0&&(c.tag||'').toLowerCase().indexOf(q)<0)return;
    }
    groups[c.page].push(c);
  });

  PAGES.forEach(function(page){
    var cards=groups[page]||[];
    var label=ce('div','admin-cat-label');
    var addBtn=ce('button','admin-add-btn','+\u65B0\u589E');
    addBtn.onclick=function(){openEditModal(null,page)};
    label.textContent=page+' ('+cards.length+')';
    label.style.display='flex';
    label.style.alignItems='center';
    label.style.justifyContent='space-between';
    label.appendChild(addBtn);
    body.appendChild(label);

    cards.forEach(function(card){
      var row=ce('div','admin-row');
      row.setAttribute('draggable','true');
      row.setAttribute('data-card-id',card.id);
      row.setAttribute('data-card-cat',card.page||card.category);

      row.addEventListener('dragstart',function(e){
        _dragCardId=card.id;
        _dragCardCat=card.page||card.category;
        row.classList.add('dragging');
        e.dataTransfer.effectAllowed='move';
        e.dataTransfer.setData('text/plain',card.id);
      });
      row.addEventListener('dragend',function(){
        row.classList.remove('dragging');
        _dragCardId=null;_dragCardCat=null;
        document.querySelectorAll('.admin-row.drag-over').forEach(function(el){el.classList.remove('drag-over')});
      });
      row.addEventListener('dragover',function(e){
        e.preventDefault();
        e.dataTransfer.dropEffect='move';
        var targetCat=row.getAttribute('data-card-cat');
        if(_dragCardCat===targetCat&&_dragCardId!==card.id){
          document.querySelectorAll('.admin-row.drag-over').forEach(function(el){el.classList.remove('drag-over')});
          row.classList.add('drag-over');
        }
      });
      row.addEventListener('dragleave',function(){row.classList.remove('drag-over')});
      row.addEventListener('drop',function(e){
        e.preventDefault();
        row.classList.remove('drag-over');
        var targetCat=row.getAttribute('data-card-cat');
        if(_dragCardCat!==targetCat)return;
        var catCards=_adminCards.filter(function(c){return (c.page||c.category)===targetCat});
        var fromIdx=-1,toIdx=-1;
        for(var i=0;i<catCards.length;i++){
          if(String(catCards[i].id)===String(_dragCardId))fromIdx=i;
          if(String(catCards[i].id)===String(card.id))toIdx=i;
        }
        if(fromIdx<0||toIdx<0||fromIdx===toIdx)return;
        var allIdx=[];
        _adminCards.forEach(function(c,i){if((c.page||c.category)===targetCat)allIdx.push(i)});
        var draggedArr=_adminCards.splice(allIdx[fromIdx],1);
        var newAllIdx=[];
        _adminCards.forEach(function(c,i){if((c.page||c.category)===targetCat)newAllIdx.push(i)});
        var insertAt=toIdx>=newAllIdx.length?newAllIdx[newAllIdx.length-1]+1:newAllIdx[toIdx];
        _adminCards.splice(insertAt,0,draggedArr[0]);
        var orderedIds=_adminCards.map(function(c){return{id:c.id}});
        gasAPI('reorderAll',{data:JSON.stringify(orderedIds)},function(r){
          if(r&&r.ok){toast('\u5DF2\u91CD\u65B0\u6392\u5E8F');refreshMainData()}
          else toast('\u6392\u5E8F\u5931\u6557');
        });
        renderAdminCards(filter);
      });

      /* Checkbox for batch */
      var cb=ce('input','admin-row-checkbox');
      cb.type='checkbox';
      cb.checked=!!_batchSelected[card.id];
      cb.onchange=function(){_batchSelected[card.id]=this.checked;updateBatchToolbar()};
      row.appendChild(cb);

      /* Thumbnail */
      var thumbUrl=card.imageUrls&&card.imageUrls.length?toDriveImg((card.imageUrls[0]||'').split('|')[0]):'';
      if(thumbUrl){
        var thumb=ce('img','admin-row-thumb');
        thumb.src=thumbUrl;
        thumb.onerror=function(){this.style.display='none'};
        row.appendChild(thumb);
      }else{
        var pholder=ce('div','admin-row-thumb-placeholder','\uD83D\uDDBC');
        row.appendChild(pholder);
      }

      var toggle=ce('div','toggle'+(card.visible!==false?' on':''));
      toggle.onclick=function(){
        card.visible=!this.classList.contains('on');
        this.classList.toggle('on');
        gasAPI('saveCard',{data:JSON.stringify(card)},function(r){
          if(r&&r.ok)toast('\u5DF2\u66F4\u65B0');
          refreshMainData();
        });
      };
      row.appendChild(toggle);

      /* Type badge + title */
      var titleSpan=ce('span','admin-row-title'+(card.visible===false?' hidden-card':''),typeBadge(card.type||'link')+esc(card.title));
      titleSpan.id='card-title-'+card.id;
      row.appendChild(titleSpan);
      var _perm=card.permission||'public';
      if(_perm==='student'){var pb=ce('span','perm-badge student','\uD83D\uDD12\u5B78\u54E1');row.appendChild(pb);}
      else if(_perm==='admin'){var pb=ce('span','perm-badge admin-perm','\uD83D\uDD11\u7BA1\u7406');row.appendChild(pb);}

      var upBtn=ce('button','reorder-btn','\u25B2');
      upBtn.title='\u4E0A\u79FB';
      upBtn.onclick=function(){gasAPI('reorderCard',{id:card.id,dir:'up'},function(){loadAdminCards();refreshMainData()})};
      row.appendChild(upBtn);

      var downBtn=ce('button','reorder-btn','\u25BC');
      downBtn.title='\u4E0B\u79FB';
      downBtn.onclick=function(){gasAPI('reorderCard',{id:card.id,dir:'down'},function(){loadAdminCards();refreshMainData()})};
      row.appendChild(downBtn);

      var editBtn=ce('button','','\u270F');
      editBtn.onclick=function(){openEditModal(card)};
      row.appendChild(editBtn);

      var dupBtn=ce('button','','\uD83D\uDCCB');
      dupBtn.title='\u8907\u88FD';
      dupBtn.onclick=function(){duplicateCard(card)};
      row.appendChild(dupBtn);

      var viewLabel=ce('span','','\uD83D\uDC41 '+((_statsData&&_statsData[card.title])||0));
      viewLabel.style.cssText='min-width:50px;font-size:12px;color:var(--text3);text-align:center';
      viewLabel.title='\u771F\u5BE6\u9EDE\u64CA\u6578';
      row.appendChild(viewLabel);

      var delBtn=ce('button','del','\u2716');
      delBtn.onclick=function(){
        if(!confirm('\u78BA\u5B9A\u522A\u9664 '+card.title+'\uFF1F'))return;
        gasAPI('deleteCard',{id:card.id},function(r){if(r&&r.ok){toast('\u5DF2\u522A\u9664');loadAdminCards();refreshMainData()}});
      };
      row.appendChild(delBtn);

      body.appendChild(row);
    });
  });

  updateBatchToolbar();
}

/* ====== Duplicate Card ====== */
function duplicateCard(card){
  var copy=JSON.parse(JSON.stringify(card));
  copy.title=(copy.title||'')+' (\u526F\u672C)';
  delete copy.id;
  copy.views=0;
  gasAPI('saveCard',{data:JSON.stringify(copy)},function(r){
    if(r&&r.ok){toast('\u5DF2\u8907\u88FD');loadAdminCards();refreshMainData()}
    else toast('\u8907\u88FD\u5931\u6557');
  });
}

/* ====== Link Checker ====== */
function checkAllLinks(){
  toast('\u6B63\u5728\u6AA2\u67E5\u9023\u7D50...');
  var cardsWithLink=_adminCards.filter(function(c){return c.linkUrl&&(c.type||'link')==='link'});
  var remaining=cardsWithLink.length;
  if(!remaining){toast('\u6C92\u6709\u9023\u7D50\u53EF\u6AA2\u67E5');return}
  cardsWithLink.forEach(function(card){
    var titleEl=document.getElementById('card-title-'+card.id);
    if(!titleEl)return;
    var oldStatus=titleEl.querySelector('.link-status');
    if(oldStatus)oldStatus.remove();
    var statusSpan=ce('span','link-status','...');
    statusSpan.style.color='var(--text3)';
    titleEl.appendChild(statusSpan);
    var img=new Image();
    var done=false;
    var timer=setTimeout(function(){
      if(!done){done=true;statusSpan.textContent=' \u26A0';statusSpan.style.color='#f87171';remaining--;if(!remaining)toast('\u9023\u7D50\u6AA2\u67E5\u5B8C\u6210')}
    },6000);
    img.onload=function(){
      if(!done){done=true;clearTimeout(timer);statusSpan.textContent=' \u2713';statusSpan.style.color='#34d399';remaining--;if(!remaining)toast('\u9023\u7D50\u6AA2\u67E5\u5B8C\u6210')}
    };
    img.onerror=function(){
      var f=new Image();
      f.onload=function(){
        if(!done){done=true;clearTimeout(timer);statusSpan.textContent=' \u2713';statusSpan.style.color='#34d399';remaining--;if(!remaining)toast('\u9023\u7D50\u6AA2\u67E5\u5B8C\u6210')}
      };
      f.onerror=function(){
        if(!done){done=true;clearTimeout(timer);statusSpan.textContent=' \u2753';statusSpan.style.color='#fbbf24';statusSpan.title='\u7121\u6CD5\u78BA\u8A8D (\u8DE8\u57DF\u9650\u5236)';remaining--;if(!remaining)toast('\u9023\u7D50\u6AA2\u67E5\u5B8C\u6210')}
      };
      try{var u=new URL(card.linkUrl);f.src=u.origin+'/favicon.ico'}catch(e){
        if(!done){done=true;clearTimeout(timer);statusSpan.textContent=' \u26A0';statusSpan.style.color='#f87171';remaining--;if(!remaining)toast('\u9023\u7D50\u6AA2\u67E5\u5B8C\u6210')}
      }
    };
    img.src=card.linkUrl;
  });
}

/* ====== Export/Import ====== */
function exportCards(){
  var data=JSON.stringify(_adminCards,null,2);
  var blob=new Blob([data],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=ce('a');
  a.href=url;
  a.download='ai-tools-export-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('\u5DF2\u532F\u51FA');
}

function importCards(e){
  var file=e.target.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var arr=JSON.parse(ev.target.result);
      if(!Array.isArray(arr)){toast('\u683C\u5F0F\u932F\u8AA4\uFF1A\u9700\u8981\u9663\u5217');return}
      if(!confirm('\u5373\u5C07\u532F\u5165 '+arr.length+' \u500B\u9805\u76EE\uFF0C\u662F\u5426\u7E7C\u7E8C\uFF1F'))return;
      var idx=0;
      function saveNext(){
        if(idx>=arr.length){toast('\u532F\u5165\u5B8C\u6210');loadAdminCards();refreshMainData();return}
        var card=arr[idx];
        delete card.id;
        delete card.views;
        gasAPI('saveCard',{data:JSON.stringify(card)},function(r){
          idx++;
          saveNext();
        });
      }
      saveNext();
    }catch(err){toast('\u89E3\u6790 JSON \u5931\u6557');}
  };
  reader.readAsText(file);
  e.target.value='';
}

/* ====== UNIFIED EDIT MODAL ====== */
function openEditModal(card,defaultPage){
  _editCard=card?JSON.parse(JSON.stringify(card)):null;
  _editType=card?(card.type==='copy'?'link':(card.type||'article')):'article';
  $('modalTitle').textContent=card?'\u7DE8\u8F2F\u9805\u76EE':'\u65B0\u589E\u9805\u76EE';
  var body=$('modalBody');
  body.innerHTML='';

  /* All cards are now articles; legacy link/file types still render correctly */
  /* Only show type selector for legacy link/file cards */
  if(_editType==='link'||_editType==='file'){
    var typeDiv=ce('div','modal-field');
    typeDiv.appendChild(ce('label','','\u985E\u578B'));
    var typeSel=ce('div','type-selector');
    typeSel.id='mf_typeSelector';
    [{val:'link',label:'\uD83D\uDD17 \u9023\u7D50'},{val:'file',label:'\uD83D\uDCC1 \u6A94\u6848'},{val:'article',label:'\uD83D\uDCDD \u6587\u7AE0'}].forEach(function(t){
      var btn=ce('button',''+(_editType===t.val?' active':''),t.label);
      btn.setAttribute('data-type',t.val);
      btn.onclick=function(){
        _editType=t.val;
        typeSel.querySelectorAll('button').forEach(function(b){b.classList.remove('active')});
        this.classList.add('active');
        toggleTypeFields();
      };
      typeSel.appendChild(btn);
    });
    typeDiv.appendChild(typeSel);
    body.appendChild(typeDiv);
  }else{
    _editType='article';
  }

  /* Common fields */
  var commonFields=[
    {key:'page',label:'\u5206\u985E',type:'select',opts:PAGES},
    {key:'title',label:'\u6A19\u984C',type:'text'},
    {key:'tag',label:'\u6A19\u7C64',type:'text'},
    {key:'desc',label:'\u63CF\u8FF0',type:'textarea'},
    {key:'imageUrls',label:'\u5716\u7247 URL (\u6BCF\u884C\u4E00\u500B)',type:'textarea'},
    {key:'visible',label:'\u4E0A\u67B6\u986F\u793A',type:'toggle'}
  ];

  commonFields.forEach(function(f){
    var div=ce('div','modal-field');
    var lbl=ce('label','',f.label);
    div.appendChild(lbl);

    if(f.type==='select'){
      var sel=ce('select');
      sel.id='mf_'+f.key;
      f.opts.forEach(function(o){
        var opt=ce('option','',esc(o));
        opt.value=o;
        if(card&&(card[f.key]||card.category)===o)opt.selected=true;
        else if(!card&&defaultPage===o)opt.selected=true;
        sel.appendChild(opt);
      });
      div.appendChild(sel);
    }else if(f.type==='textarea'){
      var ta=ce('textarea');
      ta.id='mf_'+f.key;
      ta.rows=3;
      var val=card?card[f.key]||'':'';
      if(Array.isArray(val))val=val.join('\n');
      ta.value=val;
      div.appendChild(ta);
      if(f.key==='imageUrls'){
        /* Upload button for card images */
        var imgUpRow=ce('div','');imgUpRow.style.cssText='margin-top:6px;display:flex;gap:8px';
        var imgUpBtn=ce('button','','\uD83D\uDCE4 \u4E0A\u50B3\u5716\u7247');
        imgUpBtn.type='button';
        imgUpBtn.style.cssText='padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2));cursor:pointer';
        var imgUpFile=ce('input');imgUpFile.type='file';imgUpFile.accept='image/*';imgUpFile.style.display='none';
        imgUpBtn.onclick=function(){imgUpFile.click()};
        var preview=ce('div','modal-preview');
        preview.id='mf_imgPreview';
        (function(textarea,previewEl){
          imgUpFile.onchange=function(){
            var file=this.files[0];if(!file)return;
            if(file.size>10*1024*1024){toast('\u5716\u7247\u4E0D\u53EF\u8D85\u904E 10MB');return}
            imgUpBtn.textContent='\u4E0A\u50B3\u4E2D...';imgUpBtn.disabled=true;
            compressImage(file,function(dataUrl){
              var base64=dataUrl.split(',')[1];
              var pw=sessionStorage.getItem('admin_pw')||'';
              var fd=new URLSearchParams();
              fd.set('action','uploadFile');fd.set('pw',pw);
              fd.set('fileData',base64);fd.set('fileName','card_img_'+Date.now()+'.jpg');fd.set('mimeType','image/jpeg');
              var xhr=new XMLHttpRequest();
              xhr.open('POST',GAS_API,true);
              xhr.setRequestHeader('Content-Type','application/x-www-form-urlencoded');
              xhr.onload=function(){
                imgUpBtn.textContent='\uD83D\uDCE4 \u4E0A\u50B3\u5716\u7247';imgUpBtn.disabled=false;
                try{
                  var json=xhr.responseText.match(/\{[\s\S]*\}/);
                  if(json){var r=JSON.parse(json[0]);if(r.ok&&r.directUrl){
                    var cur=textarea.value.trim();
                    textarea.value=cur?(cur+'\n'+r.directUrl):r.directUrl;
                    updateImgPreview(previewEl,textarea.value);
                    toast('\u2705 \u5716\u7247\u5DF2\u4E0A\u50B3');return;
                  }}
                  toast('\u274C \u4E0A\u50B3\u5931\u6557');
                }catch(e){toast('\u274C \u4E0A\u50B3\u5931\u6557')}
              };
              xhr.onerror=function(){imgUpBtn.textContent='\uD83D\uDCE4 \u4E0A\u50B3\u5716\u7247';imgUpBtn.disabled=false;toast('\u274C \u4E0A\u50B3\u5931\u6557')};
              xhr.send(fd.toString());
            });
            this.value='';

        prog.style.width='30%';

        formData.set('fileData',base64);
        formData.set('category','');formData.set('title',file.name);formData.set('desc','');formData.set('tag','');
        /* Use hidden iframe POST (same as gasAPIPost) — avoids CORS issues */
        prog.style.width='50%';
        var frameName='_fileUploadFrame';

        if(!iframe){iframe=document.createElement('iframe');iframe.id=frameName;iframe.name=frameName;iframe.style.display='none';document.body.appendChild(iframe)}
        var form=document.createElement('form');
        form.method='POST';form.action=GAS_API;form.target=frameName;form.style.display='none';
        var fields=formData.toString().split('&');
        fields.forEach(function(pair){

          var inp=document.createElement('input');inp.type='hidden';inp.name=decodeURIComponent(kv[0]);inp.value=decodeURIComponent(kv[1]||'');form.appendChild(inp);

            +'<br><small style="color:var(--text3)">\u2705 \u5DF2\u4E0A\u50B3\u81F3 Google Drive\uFF0C\u8ACB\u5132\u5B58\u6587\u7AE0\u5F8C\u91CD\u65B0\u7DE8\u8F2F\u4EE5\u53D6\u5F97\u4E0B\u8F09\u9023\u7D50</small></div><p><br></p>';
          if(mk){mk.outerHTML=dlHtml}
          else{ed.focus();document.execCommand('insertHTML',false,dlHtml)}
          toast('\u2705 \u6A94\u6848\u5DF2\u4E0A\u50B3\u81F3 Google Drive');
        },6000);
      };
      reader.readAsDataURL(file);
    };
    document.body.appendChild(fi);fi.click();document.body.removeChild(fi);
  };
  rtToolbar.appendChild(fileBtn);

  editorDiv.appendChild(rtToolbar);

  var editor=ce('div','rte-editor');

  editor.addEventListener('dragover',function(e){e.preventDefault();e.dataTransfer.dropEffect='copy';this.style.outline='2px dashed var(--accent)'});
  editor.addEventListener('dragleave',function(){this.style.outline=''});
  editor.addEventListener('drop',function(e){
    e.preventDefault();
    this.style.outline='';
    var files=e.dataTransfer.files;
    if(!files||!files.length)return;
    for(var i=0;i<files.length;i++){
      (function(file){
        if(!file.type.startsWith('image/'))return;
        if(file.size>10*1024*1024){toast('圖片不可超過 10MB');return;}
        insertCompressedImage(file,'uploaded image');
      })(files[i]);
    }
  });
  /* Paste image support */
  editor.addEventListener('paste',function(e){
    var items=e.clipboardData&&e.clipboardData.items;
    if(!items)return;
    for(var i=0;i<items.length;i++){
      if(items[i].type.indexOf('image')>=0){
        e.preventDefault();
        var file=items[i].getAsFile();
        if(file.size>10*1024*1024){toast('圖片不可超過 10MB');return;}
        insertCompressedImage(file,'pasted image');

  var previewBtn=ce('button','preview-article-btn','👁 預覽');
