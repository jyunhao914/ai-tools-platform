    previewWin.document.write('<html><head><title>文章預覽</title><style>body{font-family:"Noto Sans TC",sans-serif;max-width:800px;margin:0 auto;padding:40px 24px;color:#e2e8f0;background:#07090f;line-height:1.9;font-size:15px}h2{font-size:22px;font-weight:700;margin:28px 0 12px}h3{font-size:18px;font-weight:600;margin:20px 0 10px}p{margin-bottom:16px}img{max-width:100%;border-radius:8px;margin:16px 0}a{color:#38bdf8}blockquote{border-left:3px solid #38bdf8;padding:8px 16px;margin:16px 0;color:#94a3b8;background:rgba(255,255,255,0.042);border-radius:0 8px 8px 0}table{width:100%;border-collapse:collapse;margin:16px 0}th,td{border:1px solid rgba(255,255,255,0.12);padding:8px 12px;text-align:left}th{background:rgba(56,189,248,0.08);font-weight:600}pre{background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:16px 18px;margin:16px 0;overflow-x:auto}code{font-family:"Fira Code","Courier New",monospace;font-size:0.82rem;color:#a6e3a1}</style></head><body>'+content+'</body></html>');
    previewWin.document.close();
  };
  editorBar.appendChild(previewBtn);
  var autosaveLabel=ce('span','autosave-indicator','');
  autosaveLabel.id='autosaveLabel';
  editorBar.appendChild(autosaveLabel);
  editorDiv.appendChild(editorBar);

  /* Autosave to localStorage every 30s */
  var _autosaveKey='article_draft_'+(card?card.id:'new');
  /* Restore draft if exists */
  var draft=localStorage.getItem(_autosaveKey);
  if(draft&&!editor.innerHTML.trim()){
    editor.innerHTML=draft;
    autosaveLabel.textContent='已還原草稿';
    autosaveLabel.className='autosave-indicator saved';
  }
  setInterval(function(){
    var ed=$('articleEditor');
    if(!ed)return;
    var content=ed.innerHTML;
    if(content&&content!=='<br>'){
      localStorage.setItem(_autosaveKey,content);
      var lbl=$('autosaveLabel');
      if(lbl){lbl.textContent='已自動存稿 '+new Date().toLocaleTimeString();lbl.className='autosave-indicator saved';}
    }
  },30000);

  articleDiv.appendChild(editorDiv);
  body.appendChild(articleDiv);

  /* COPY-specific fields */
  var copyDiv=ce('div','');
  copyDiv.id='mf_copyFields';
  var existingCopy=card||{};

  var btnLabelField=ce('div','modal-field');
  btnLabelField.appendChild(ce('label','','按鈕名稱 (btnLabel)'));
  var btnLabelInp=ce('input');
  btnLabelInp.id='mf_btnLabel';
  btnLabelInp.type='text';
  btnLabelInp.value=existingCopy.btnLabel||'點我複製';
  btnLabelInp.placeholder='例：複製 Prompt / 複製連結';
  btnLabelField.appendChild(btnLabelInp);
  copyDiv.appendChild(btnLabelField);

  var btnIconField=ce('div','modal-field');
  btnIconField.appendChild(ce('label','','按鈕圖示 (btnIcon)'));
  var btnIconSel=ce('select');
  btnIconSel.id='mf_btnIcon';
  [['📋','📋 剪貼簿'],['🔗','🔗 連結'],['💻','💻 程式碼'],['📤','📤 分享'],['📝','📝 文字']].forEach(function(opt){
    var o=ce('option','',opt[1]);
    o.value=opt[0];
    if((existingCopy.btnIcon||'📋')===opt[0])o.selected=true;
    btnIconSel.appendChild(o);
  });
  btnIconField.appendChild(btnIconSel);
  copyDiv.appendChild(btnIconField);

  var btnStyleField=ce('div','modal-field');
  btnStyleField.appendChild(ce('label','','按鈕樣式 (btnStyle)'));
  var btnStyleSel=ce('select');
  btnStyleSel.id='mf_btnStyle';
  [['primary','主要（強調色）'],['secondary','次要（低調灰）']].forEach(function(opt){
    var o=ce('option','',opt[1]);
    o.value=opt[0];
    if((existingCopy.btnStyle||'primary')===opt[0])o.selected=true;
    btnStyleSel.appendChild(o);
  });
  btnStyleField.appendChild(btnStyleSel);
  copyDiv.appendChild(btnStyleField);

  var copyContentField=ce('div','modal-field');
  var copyContentLbl=ce('label','','複製內容 (copyContent)');
  copyContentLbl.appendChild(ce('small','',' — 連結、程式碼、Prompt 皆可'));
  copyContentField.appendChild(copyContentLbl);
  var copyContentTa=ce('textarea');
  copyContentTa.id='mf_copyContent';
  copyContentTa.rows=6;
  copyContentTa.placeholder='貼入要複製的內容...';
  copyContentTa.value=existingCopy.copyContent||'';

  body.appendChild(copyDiv);

  toggleTypeFields();
  $('modalOverlay').classList.add('show');
}

function toggleTypeFields(){
  var linkFields=document.getElementById('mf_linkFields');
  var fileFields=document.getElementById('mf_fileFields');
  var articleFields=document.getElementById('mf_articleFields');
  var copyFields=document.getElementById('mf_copyFields');
  /* link type is legacy but still editable for existing cards */
  if(linkFields)linkFields.style.display=_editType==='link'?'':'none';
  if(fileFields)fileFields.style.display=_editType==='file'?'':'none';
  if(articleFields)articleFields.style.display=(_editType==='article')?'':'none';
  if(copyFields)copyFields.style.display='none';
}

function updateImgPreview(container,val){
  container.innerHTML='';
  if(!val)return;
  val.split('\n').forEach(function(line){
    var spec=parseImgSpec(line.trim());
    if(!spec)return;
    var img=ce('img');
    img.src=spec.url;
    img.onerror=function(){this.style.display='none'};
    container.appendChild(img);
  });
}

$('modalClose').onclick=function(){$('modalOverlay').classList.remove('show');_editCard=null};
$('modalCancel').onclick=function(){$('modalOverlay').classList.remove('show');_editCard=null};
$('modalOverlay').onclick=function(e){if(e.target===this){this.classList.remove('show');_editCard=null}};

$('modalSave').onclick=function(){
  /* Announcement save */
  if(_editCard==='__announcement__'){
    var annText=(document.getElementById('mf_announcement')||{}).value||'';
    var annVisible=document.getElementById('mf_announcement_visible').classList.contains('on')?'true':'false';
    gasAPI('saveSetting',{key:'announcement',value:annText},function(r1){
      gasAPI('saveSetting',{key:'announcement_visible',value:annVisible},function(r2){
        _settings.announcement=annText;
        _settings.announcement_visible=annVisible;
        applyAnnouncement();
        toast('\u516C\u544A\u5DF2\u5132\u5B58');
        $('modalOverlay').classList.remove('show');
        _editCard=null;
      });
    });
    return;
  }
  /* SEO save */
  if(_editCard==='__seo__'){
    var seoFields=['seo_title','seo_description','seo_og_image'];
    var idx=0;
    function saveNextSEO(){
      if(idx>=seoFields.length){
        applySEO();
        toast('SEO \u5DF2\u5132\u5B58');
        $('modalOverlay').classList.remove('show');
        _editCard=null;
        return;
      }
      var key=seoFields[idx];
      var val=(document.getElementById('mf_'+key)||{}).value||'';
      _settings[key]=val;
      gasAPI('saveSetting',{key:key,value:val},function(){idx++;saveNextSEO()});
    }
    saveNextSEO();
    return;
  }

  if(_editCard==='__siteinfo__'){
    var siteFields=['site_title','site_subtitle','site_badge','site_footer','site_nav_title'];
    var si=0;
    function saveNextSite(){
      if(si>=siteFields.length){
        applySiteInfo();
        toast('\u57FA\u672C\u8CC7\u6599\u5DF2\u5132\u5B58');
        $('modalOverlay').classList.remove('show');
        _editCard=null;
        return;
      }
      var key=siteFields[si];
      var val=(document.getElementById('mf_'+key)||{}).value||'';
      _settings[key]=val;
      gasAPI('saveSetting',{key:key,value:val},function(){si++;saveNextSite()});
    }
    saveNextSite();
    return;
  }

  /* ====== UNIFIED CARD SAVE ====== */
  var card=_editCard||{};
  card.page=document.getElementById('mf_page').value;
  card.category=card.page;
  card.title=document.getElementById('mf_title').value;
  card.tag=document.getElementById('mf_tag').value;
  card.desc=document.getElementById('mf_desc').value;
  var imgRaw=document.getElementById('mf_imageUrls').value;
  card.imageUrls=imgRaw?imgRaw.split('\n').map(function(s){return s.trim()}).filter(function(s){return s}):[];
  card.visible=document.getElementById('mf_visible').classList.contains('on');
  card.permission=(document.getElementById('mf_permission')||{}).value||'public';
  card.type=_editType;

  if(!card.title){toast('\u8ACB\u8F38\u5165\u6A19\u984C');return}

  if(_editType==='link'){
    card.linkBehavior=(document.getElementById('mf_linkBehavior')||{}).value||'open';
    card.linkUrl=(document.getElementById('mf_linkUrl')||{}).value||'';
    card.copyContent=(document.getElementById('mf_copyContent')||{}).value||'';
    card.linkBtnLabel=(document.getElementById('mf_linkBtnLabel')||{}).value||'';
    card.linkBtnIcon=(document.getElementById('mf_linkBtnIcon')||{}).value||'';
    card.btnStyle=(document.getElementById('mf_btnStyle')||{}).value||'primary';
    /* Store ALL button config in meta1/meta2/meta3 so getData (no auth) can render correctly */
    card.meta1=card.linkBehavior==='copy'?'copy':'open';
    card.meta2=card.linkBtnLabel||'';
    card.meta3=JSON.stringify({i:card.linkBtnIcon||'',s:card.btnStyle||'primary',c:card.copyContent||''});
    card.btnLabel=card.linkBtnLabel;
    card.btnIcon=card.linkBtnIcon;
    card.extra=JSON.stringify({linkBehavior:card.linkBehavior,linkBtnLabel:card.linkBtnLabel,linkBtnIcon:card.linkBtnIcon,copyContent:card.copyContent,btnStyle:card.btnStyle});
    gasAPI('saveCard',{data:JSON.stringify(card)},function(r){
      if(r&&r.ok){toast('\u5DF2\u5132\u5B58');$('modalOverlay').classList.remove('show');_editCard=null;loadAdminCards();refreshMainData()}
      else toast('\u5132\u5B58\u5931\u6557');
    });

  }else if(_editType==='file'){
    var fileInput=document.getElementById('mf_uploadFile');
    var file=fileInput&&fileInput.files[0];
    var existingExtra=(card.extra&&typeof card.extra==='object')?card.extra:(card.extra?JSON.parse(card.extra):{});

    if(file){
      /* Upload new file then save card */
      var reader=new FileReader();
      reader.onload=function(){
        var base64=reader.result.split(',')[1];
        var xhr=new XMLHttpRequest();
        var formData=new URLSearchParams();
        formData.set('action','uploadFile');
        formData.set('pw',sessionStorage.getItem('admin_pw')||'');
        formData.set('fileData',base64);
        formData.set('fileName',file.name);
        formData.set('mimeType',file.type||'application/octet-stream');
        formData.set('title',card.title);
        formData.set('desc',card.desc);
        formData.set('category',card.category);
        formData.set('tag',card.tag||'');

        var progress=document.getElementById('uploadProgress');
        var bar=document.getElementById('uploadProgressBar');
        if(progress)progress.style.display='block';

        xhr.open('POST',GAS_API);
        xhr.setRequestHeader('Content-Type','application/x-www-form-urlencoded');
        xhr.onload=function(){
          if(bar)bar.style.width='100%';
          try{
            var json=xhr.responseText.match(/\{[\s\S]*\}/);
            if(json){var res=JSON.parse(json[0]);
              if(res&&res.ok){
                toast('\u4E0A\u50B3\u6210\u529F');
                $('modalOverlay').classList.remove('show');
                _editCard=null;
                loadAdminCards();
                refreshMainData();
              }else{
                toast('\u4E0A\u50B3\u5931\u6557'+(res&&res.error?': '+res.error:''));
              }
            }else{toast('\u4E0A\u50B3\u5931\u6557')}
          }catch(e){toast('\u4E0A\u50B3\u5931\u6557')}
        };
        xhr.onerror=function(){toast('\u4E0A\u50B3\u5931\u6557')};
        xhr.send(formData.toString());
      };
      reader.readAsDataURL(file);
    }else if(existingExtra.fileUrl){
      /* No new file, just update card metadata */
      card.linkUrl=existingExtra.fileUrl||'';
      card.extra=JSON.stringify(existingExtra);
      gasAPI('saveCard',{data:JSON.stringify(card)},function(r){
        if(r&&r.ok){toast('\u5DF2\u5132\u5B58');$('modalOverlay').classList.remove('show');_editCard=null;loadAdminCards();refreshMainData()}
        else toast('\u5132\u5B58\u5931\u6557');
      });
    }else{
      toast('\u8ACB\u9078\u64C7\u6A94\u6848');
    }

  }else if(_editType==='article'){
    var coverImage=(document.getElementById('mf_articleCover')||{}).value||'';
    var editorEl=document.getElementById('articleEditor');
    var content=editorEl?editorEl.innerHTML:'';

    var articleData={
      id:card.id||undefined,
      title:card.title,
      desc:card.desc,
      category:card.category,
      tag:card.tag||'',
      visible:card.visible,
      content:content,
      coverImage:coverImage
    };

    /* Save article via POST (content can be very large) */
    var artPerm=(document.getElementById('mf_permission')||{}).value||'public';
    var contentB64=btoa(unescape(encodeURIComponent(content)));
    var cardData=JSON.stringify({id:articleData.id,title:articleData.title,desc:articleData.desc,
        category:articleData.category,tag:articleData.tag,visible:articleData.visible,
        coverImage:coverImage,permission:artPerm});
    toast('儲存中...');
    gasAPIPost('saveArticle',{data:cardData,contentB64:contentB64},function(r){
      toast('\u6587\u7AE0\u5DF2\u5132\u5B58');
      $('modalOverlay').classList.remove('show');_editCard=null;
      setTimeout(function(){loadAdminCards();refreshMainData()},2000);
    });

  }else if(_editType==='copy'){
    card.btnLabel=(document.getElementById('mf_btnLabel')||{}).value||'點我複製';
    card.btnIcon=(document.getElementById('mf_btnIcon')||{}).value||'📋';
    card.btnStyle=(document.getElementById('mf_btnStyle')||{}).value||'primary';
    card.copyContent=(document.getElementById('mf_copyContent')||{}).value||'';
    gasAPI('saveCard',{data:JSON.stringify(card)},function(r){
      if(r&&r.ok){toast('\u5DF2\u5132\u5B58');$('modalOverlay').classList.remove('show');_editCard=null;loadAdminCards();refreshMainData()}
      else toast('\u5132\u5B58\u5931\u6557');
    });
  }
};

/* ====== ADMINS TAB ====== */
function loadAdminEmails(){
  $('adminBody').innerHTML='<div class="loading-placeholder"><span class="spinner"></span>\u8F09\u5165\u4E2D...</div>';
  gasAPI('getAdmins',null,function(res){
    if(!res||!res.ok){$('adminBody').innerHTML='<p>\u8F09\u5165\u5931\u6557</p>';return}
    _adminEmails=res.admins||[];
    renderAdminEmails();
  });
}

function renderAdminEmails(){
  var body=$('adminBody');
  body.innerHTML='';

  var addRow=ce('div','admin-email-add');
  var inp=ce('input');
  inp.placeholder='\u8F38\u5165 Email...';
  inp.id='adminEmailInput';
  addRow.appendChild(inp);
  var addBtn=ce('button','','+\u65B0\u589E');
  addBtn.onclick=function(){
    var v=document.getElementById('adminEmailInput').value.trim();
    if(!v)return;
    _adminEmails.push(v);
    saveAdminEmails();
  };
  addRow.appendChild(addBtn);
  body.appendChild(addRow);

  _adminEmails.forEach(function(email,i){
    var row=ce('div','admin-email-row');
    row.appendChild(ce('span','',esc(email)));
    var del=ce('button','','\u2716');
    del.onclick=function(){
      _adminEmails.splice(i,1);
      saveAdminEmails();
    };
    row.appendChild(del);
    body.appendChild(row);
  });

      savePagesAndRefresh();
    };
    row.appendChild(upBtn);

    var downBtn=ce('button','','\u25BC');
    downBtn.onclick=function(){
      if(i>=PAGES.length-1)return;
      var tmp=PAGES[i];PAGES[i]=PAGES[i+1];PAGES[i+1]=tmp;
      savePagesAndRefresh();
    };
    row.appendChild(downBtn);

    var renameBtn=ce('button','','\u270F');
    renameBtn.onclick=function(){
      var newName=prompt('\u65B0\u540D\u7A31\uFF1A',page);
      if(!newName||newName===page)return;
      PAGES[i]=newName;
      _adminCards.forEach(function(c){
        if(c.page===page||c.category===page){
          c.page=newName;c.category=newName;
          gasAPI('saveCard',{data:JSON.stringify(c)},null);
        }
      });
      savePagesAndRefresh();
    };
    row.appendChild(renameBtn);

    var delBtn=ce('button','del','\u2716');
    delBtn.onclick=function(){
      if(!confirm('\u78BA\u5B9A\u522A\u9664\u5206\u985E\u300C'+page+'\u300D\uFF1F'))return;
      PAGES.splice(i,1);
      savePagesAndRefresh();
    };
    row.appendChild(delBtn);

    body.appendChild(row);
  });
}

var _searchActive=false;
function initSearch(){
  var input=$('globalSearch');
  var mobileInput=$('mobileSearch');
  function syncSearch(sourceEl){
    var otherEl=(sourceEl===input)?mobileInput:input;
    if(otherEl)otherEl.value=sourceEl.value;
  }
  function handleSearch(){
    syncSearch(this);
    var q=this.value.trim().toLowerCase();
    if(q){
      _searchActive=true;
      var tabs=$('navTabs');
      if(tabs)tabs.style.display='none';
      var results=CARDS.filter(function(c){
        if(c.visible===false)return false;
        var title=(c.title||'').toLowerCase();
        var desc=(c.description||c.desc||'').toLowerCase();
        var tag=(c.tag||'').toLowerCase();
        return title.indexOf(q)>=0||desc.indexOf(q)>=0||tag.indexOf(q)>=0;
      });
      var grid=$('toolsGrid');
      grid.innerHTML='';
      $('toolsHead').innerHTML='\u641C\u5C0B\u7D50\u679C <span>\uFF08'+results.length+' \u9805\uFF09</span>';
      if(!results.length){
        grid.innerHTML='<div class="tools-empty">\uD83D\uDD0D \u627E\u4E0D\u5230\u7B26\u5408\u7684\u5167\u5BB9</div>';
        return;
      }
      results.forEach(function(card){
        var type=card.type||'link';
        if(type==='article') renderOneArticleCard(grid,card);
        else if(type==='file') renderOneFileCard(grid,card);
        else renderOneLinkCard(grid,card);
      });
      observeCards();
    }else{
      _searchActive=false;
      var tabs=$('navTabs');
      if(tabs)tabs.style.display='';
      renderCards();
      observeCards();
    }
  }
  if(input)input.addEventListener('input',handleSearch);
  if(mobileInput)mobileInput.addEventListener('input',handleSearch);
}

/* ====== INTERSECTION OBSERVER FOR CARDS ====== */
var _cardObserver=null;
function observeCards(){
  if(_cardObserver)_cardObserver.disconnect();
  if(!('IntersectionObserver' in window)){
    document.querySelectorAll('.card').forEach(function(c){c.classList.add('visible')});
    return;
  }
  _cardObserver=new IntersectionObserver(function(entries){
    entries.forEach(function(entry){
      if(entry.isIntersecting){
        entry.target.classList.add('visible');
        _cardObserver.unobserve(entry.target);
      }
    });
  },{threshold:0.08});
  document.querySelectorAll('.card:not(.visible)').forEach(function(c){
    _cardObserver.observe(c);
  });
}

/* ====== CACHE LAYER ====== */
var CACHE_KEY='aitools_v4';
var CACHE_TTL=300000; /* 5 min */

function saveCache(obj){
  try{obj._ts=Date.now();obj._ver=4;localStorage.setItem(CACHE_KEY,JSON.stringify(obj));
  /* clear ALL old cache keys */
  try{['aitools_cache','aitools_v2','aitools_v3'].forEach(function(k){localStorage.removeItem(k)})}catch(e2){}
  }catch(e){}
}
function loadCache(){
  try{
    /* clear ALL legacy caches */
    try{['aitools_cache','aitools_v2','aitools_v3'].forEach(function(k){localStorage.removeItem(k)})}catch(e2){}
    var raw=localStorage.getItem(CACHE_KEY);
    if(!raw)return null;
    var obj;
    try{obj=JSON.parse(raw)}catch(pe){localStorage.removeItem(CACHE_KEY);return null}
    /* Validate cache: must have cards array with items and valid pages */
    if(!obj||typeof obj!=='object'||!Array.isArray(obj.cards)||!obj.cards.length||!Array.isArray(obj.pages)||!obj.pages.length){
      localStorage.removeItem(CACHE_KEY);return null;
    }
    /* Expire cache after 1 hour */
    if(obj._ts&&(Date.now()-obj._ts>3600000)){
      localStorage.removeItem(CACHE_KEY);return null;
    }
    return obj;
  }catch(e){
    try{localStorage.removeItem(CACHE_KEY)}catch(e2){}
    return null;
  }
}

function mergeAdminExtra(cards,adminCards){
  if(!adminCards)return;
  var map={};
  adminCards.forEach(function(ac){if(ac.id)map[ac.id]=ac;if(ac.title)map['t_'+ac.title]=ac;});
  cards.forEach(function(c){
    var full=map[c.id]||map['t_'+c.title];
    if(!full)return;
    if(full.extra){
      var ex=(typeof full.extra==='string')?JSON.parse(full.extra||'{}'):full.extra;
      c.extra=ex;
      ['linkBehavior','linkBtnLabel','linkBtnIcon','copyContent','btnStyle'].forEach(function(k){if(ex[k])c[k]=ex[k]});
    }
    ['meta1','copyContent','btnLabel','btnIcon','btnStyle'].forEach(function(k){if(full[k])c[k]=full[k]});
  });
  /* Auto-migrate: if admin has pw, write meta1/meta2/meta3 for cards missing them */
  if(sessionStorage.getItem('admin_pw')){
    autoMigrateMeta(cards);
  }
}

function autoMigrateMeta(cards){
  var migrated=localStorage.getItem('_meta_migrated_v1');
  if(migrated)return;
  var queue=[];
  cards.forEach(function(c){
    if(c.type!=='link'&&c.type!=='copy')return;
    var behavior=c.linkBehavior||((c.meta1==='copy')?'copy':'open');
    var needsUpdate=false;
    /* Check if meta fields need updating */
    if(c.meta1!==behavior)needsUpdate=true;
    if(behavior==='copy'&&!c.meta3)needsUpdate=true;
    if(c.linkBtnLabel&&!c.meta2)needsUpdate=true;
    if(!needsUpdate)return;
    /* Build updated card */
    c.meta1=behavior;
    c.meta2=c.linkBtnLabel||c.btnLabel||'';
    c.meta3=JSON.stringify({i:c.linkBtnIcon||c.btnIcon||'',s:c.btnStyle||'primary',c:c.copyContent||''});
    queue.push(JSON.parse(JSON.stringify(c)));
  });
  if(!queue.length){localStorage.setItem('_meta_migrated_v1','1');return;}
  var idx=0;
  function saveNext(){
    if(idx>=queue.length){
      localStorage.setItem('_meta_migrated_v1','1');
      console.log('[Migration] Done, updated '+queue.length+' cards');
      return;
    }
    var card=queue[idx];idx++;
    gasAPI('saveCard',{data:JSON.stringify(card)},function(r){
      console.log('[Migration] '+(r&&r.ok?'OK':'FAIL')+': '+card.title);
      saveNext();
    });
  }
  console.log('[Migration] Updating '+queue.length+' cards with meta fields...');
  saveNext();
}

function applyFullData(data,adminCards){
  if(data){
    if(data.cards&&data.cards.length)CARDS=data.cards;
    if(data.pages&&data.pages.length)PAGES=data.pages;
    if(data.gemUrl)GEM_URL=data.gemUrl;
    var _s=data.stats||{};_statsData=_s.tools||_s;_totalVisits=_s.total||0;
    if(data.settings){_settings=data.settings;applyAnnouncement();applySEO();applySiteInfo();}
  }
  mergeAdminExtra(CARDS,adminCards);
  /* Set active tab if not yet set */
  if(!_activeTab&&PAGES.length){
    var hash=decodeURIComponent(location.hash.replace('#',''));
    if(hash&&PAGES.indexOf(hash)>=0)_activeTab=hash;
    else{_activeTab=PAGES[0];location.hash=PAGES[0];}
  }
  buildNavTabs();buildHeroGrid();renderCards();updateVisit();observeCards();
  checkArticleHash();
}

/* ====== INIT ====== */
function init(){
  initTheme();
  buildStars();
  initSearch();
  gasAPI('recordClick',{title:'_page_view'},null);

  /* 1. Try render from localStorage cache (instant, correct data) */
  var cache=loadCache();
  var _hasCache=false;
  if(cache&&cache.cards&&cache.cards.length){
    _hasCache=true;
    CARDS=cache.cards;
    if(cache.pages&&cache.pages.length)PAGES=cache.pages;
    if(cache.stats)_statsData=cache.stats;
    if(cache.settings){_settings=cache.settings;applyAnnouncement();applySEO();applySiteInfo();}
  }
  var hash=decodeURIComponent(location.hash.replace('#',''));
  if(hash&&PAGES.indexOf(hash)>=0){_activeTab=hash;location.hash=hash;}
  else if(PAGES.length){_activeTab=PAGES[0];location.hash=PAGES[0];}
  if(_hasCache){
    buildNavTabs();buildHeroGrid();renderCards();updateVisit();observeCards();
  }
  /* Resume admin mode if already logged in */
  if(sessionStorage.getItem('admin_pw')){enableAdminMode()}
  /* Resume student mode if token in localStorage */
  (function(){
    var stok=localStorage.getItem('student_token');
    if(stok){_userRole='student';var badge=$('studentBadge');if(badge)badge.style.display='';}
  })();
  /* Footer hidden student login dot */
  var _dot=$('studentLoginDot');
  if(_dot)_dot.onclick=function(){if(_userRole==='public')showStudentLogin();};
  /* Student badge click → logout menu */
  (function(){
    var badge=$('studentBadge');
    if(!badge)return;
    badge.onclick=function(e){
      e.stopPropagation();
      var menu=document.getElementById('studentBadgeMenu');
      if(menu){menu.remove();return;}
      menu=ce('div','student-badge-menu');menu.id='studentBadgeMenu';
      var logoutBtn=ce('button','','\u767B\u51FA');
      logoutBtn.onclick=function(e){e.stopPropagation();menu.remove();disableStudentMode();toast('\u5DF2\u767B\u51FA\u5B78\u54E1\u6A21\u5F0F');};
      menu.appendChild(logoutBtn);
      badge.appendChild(menu);
      document.addEventListener('click',function hide(){menu.remove();document.removeEventListener('click',hide)},{once:true});
    };
  })();
  /* If no cache: skeleton stays, nav/hero/counter all wait for API */
  /* If no cache, skeleton stays visible until API returns */

  /* 2. Fetch fresh data in background (parallel, failover) */
  var _gotData=false,_gotAdmin=false,_freshData=null,_adminCards=null;
  var _applied=false;

  function tryApply(){
    if(_applied)return;
    /* Apply as soon as getData returns (don't wait for admin) */
    if(_gotData){
      _applied=true;
      applyFullData(_freshData,_adminCards);
      saveCache({cards:CARDS,pages:PAGES,stats:_statsData,settings:_settings});
    }
  }

  gasAPI('getData',null,function(data){
    _gotData=true;_freshData=data;
    if(_gotAdmin)tryApply();
    else setTimeout(tryApply,2000); /* Don't wait forever for admin data */
  });
  if(sessionStorage.getItem('admin_pw')){
    gasAPI('getCardsAdmin',null,function(res){
      _gotAdmin=true;
      if(res&&res.ok&&res.cards)_adminCards=res.cards;
      if(_gotData)tryApply();
    });
  }else{
    _gotAdmin=true; /* 非管理員：跳過 getCardsAdmin，直接允許 tryApply */
  }
  /* Failsafe: if getData fails/times out, render whatever we have after 15s */
  setTimeout(function(){if(!_applied&&CARDS.length){_applied=true;buildNavTabs();buildHeroGrid();renderCards();updateVisit();observeCards();}},15000);

  window.addEventListener('hashchange',function(){
    var h=decodeURIComponent(location.hash.replace('#',''));
    if(h.indexOf('article=')===0)checkArticleHash();
    else if(h&&PAGES.indexOf(h)>=0&&h!==_activeTab)switchTab(h);
  });
  checkArticleHash();
}

/* ====== IMAGE EDIT TOOLBAR IN EDITOR ====== */
var _imgToolbar=null;
var _imgSelected=null;

function createImgToolbar(){
  if(_imgToolbar)return _imgToolbar;
  var tb=document.createElement('div');
  tb.className='img-edit-toolbar';
  tb.style.display='none';

  function addBtn(text,cls,fn){
    var b=document.createElement('button');
    b.textContent=text;
    if(cls)b.className=cls;
    b.onmousedown=function(e){e.preventDefault()};
    b.onclick=function(e){e.preventDefault();fn(b)};
    tb.appendChild(b);
    return b;
  }
  function addSep(){var s=document.createElement('div');s.className='iet-sep';tb.appendChild(s)}

  /* Size */
  addBtn('小','',function(){applyImgClass('img-size-','img-size-small')});
  addBtn('中','',function(){applyImgClass('img-size-','img-size-medium')});
  addBtn('大','',function(){applyImgClass('img-size-','img-size-large')});
  addBtn('滿版','',function(){applyImgClass('img-size-','img-size-full')});
  addSep();
  /* Alignment / Float */
  addBtn('⬅ 左浮','',function(){applyImgClass('img-float-|img-center','img-float-left')});
  addBtn('置中','',function(){applyImgClass('img-float-|img-center','img-center')});
  addBtn('右浮 ➡','',function(){applyImgClass('img-float-|img-center','img-float-right')});
  addSep();
  /* Delete */
  addBtn('🗑 刪除','iet-danger',function(){
    if(_imgSelected){_imgSelected.remove();hideImgToolbar()}
  });

  document.body.appendChild(tb);
  _imgToolbar=tb;
  return tb;
}

function applyImgClass(removePrefix,addClass){
  if(!_imgSelected)return;
  /* Remove classes matching prefix patterns (pipe-separated) */
  removePrefix.split('|').forEach(function(pf){
    var toRemove=[];
    _imgSelected.classList.forEach(function(c){if(c.indexOf(pf)===0)toRemove.push(c)});
    toRemove.forEach(function(c){_imgSelected.classList.remove(c)});
  });
  if(addClass)_imgSelected.classList.add(addClass);
  positionImgToolbar();
  updateImgToolbarActive();
}

function showImgToolbar(img){
  if(_imgSelected)_imgSelected.classList.remove('img-selected');
  _imgSelected=img;
  img.classList.add('img-selected');
  var tb=createImgToolbar();
  tb.style.display='flex';
  positionImgToolbar();
  updateImgToolbarActive();
}

function positionImgToolbar(){
  if(!_imgToolbar||!_imgSelected)return;
  var rect=_imgSelected.getBoundingClientRect();
  _imgToolbar.style.left=Math.max(8,rect.left)+'px';
  _imgToolbar.style.top=Math.max(8,rect.top-44)+'px';
  _imgToolbar.style.position='fixed';
}

function hideImgToolbar(){
  if(_imgSelected){_imgSelected.classList.remove('img-selected');_imgSelected=null}
  if(_imgToolbar)_imgToolbar.style.display='none';
}

function updateImgToolbarActive(){
  if(!_imgToolbar||!_imgSelected)return;
  var btns=_imgToolbar.querySelectorAll('button');
  var cls=_imgSelected.className;
  var map={'小':'img-size-small','中':'img-size-medium','大':'img-size-large','滿版':'img-size-full','⬅ 左浮':'img-float-left','置中':'img-center','右浮 ➡':'img-float-right'};
  btns.forEach(function(b){
    var expected=map[b.textContent];
    if(expected)b.classList.toggle('active',cls.indexOf(expected)>=0);
  });
}

/* Delegate click on images inside editor */
document.addEventListener('click',function(e){
  var editor=$('articleEditor');
  if(!editor)return;
  if(e.target.tagName==='IMG'&&editor.contains(e.target)){
    e.preventDefault();
    showImgToolbar(e.target);
    return;
  }
  /* Click outside image: hide toolbar (but not if clicking toolbar itself) */
  if(_imgToolbar&&!_imgToolbar.contains(e.target)){
    hideImgToolbar();
  }
});

/* ====== INLINE BUTTON (ICB) SYSTEM — unified copy + link ====== */
var _icbEditTarget=null;
var _icbMode='block';
var _icbStyle='primary';
var _icbBehavior='copy'; /* 'copy' or 'link' */
var _ICB_MARKER_ID='_icb_insert_marker_';
var _lastEditorRange=null;

/* Track cursor position in editor on every interaction */
document.addEventListener('mouseup',function(){_saveEditorRange()},true);
document.addEventListener('keyup',function(){_saveEditorRange()},true);
function _saveEditorRange(){
  var editor=$('articleEditor');if(!editor)return;
  var sel=window.getSelection();if(!sel||!sel.rangeCount)return;
  var range=sel.getRangeAt(0);
  if(editor.contains(range.startContainer)){_lastEditorRange=range.cloneRange()}
}

function openIcbDialog(existingEl){
  /* Insert a temporary marker at last known cursor position */
  if(!existingEl){
    var editor=$('articleEditor');
    if(editor){
      /* Remove any old marker */
      var old=document.getElementById(_ICB_MARKER_ID);if(old)old.parentNode.removeChild(old);
      /* Restore last known cursor position, then insert marker */
      if(_lastEditorRange){
        var sel=window.getSelection();
        sel.removeAllRanges();
        sel.addRange(_lastEditorRange);
        document.execCommand('insertHTML',false,'<span id="'+_ICB_MARKER_ID+'" style="display:none">\u200B</span>');
      }else{
        /* No saved position — append marker at end */
        var mk=document.createElement('span');mk.id=_ICB_MARKER_ID;mk.style.display='none';
        editor.appendChild(mk);
      }
    }
  }
  _icbEditTarget=existingEl;
  var overlay=$('icbDialogOverlay');
  $('icbDialogTitle').textContent=existingEl?'\u7DE8\u8F2F\u6309\u9375':'\u63D2\u5165\u6309\u9375';
  $('icbConfirm').textContent=existingEl?'\u66F4\u65B0':'\u63D2\u5165';
  $('icbDelete').style.display=existingEl?'inline-block':'none';

  /* Populate from existing or defaults */
  var data={label:'\u9EDE\u6211\u8907\u88FD',icon:'\uD83D\uDCCB',style:'primary',mode:'block',behavior:'copy',copy:'',desc:'',linkUrl:'',linkNewTab:true};
  if(existingEl){
    data.label=existingEl.getAttribute('data-label')||data.label;
    data.icon=existingEl.getAttribute('data-icon')||data.icon;
    data.style=existingEl.getAttribute('data-style')||data.style;
    data.mode=existingEl.getAttribute('data-mode')||data.mode;
    data.behavior=existingEl.getAttribute('data-behavior')||data.behavior;
    data.copy=existingEl.getAttribute('data-copy-b64')?_b64d(existingEl.getAttribute('data-copy-b64')):(existingEl.getAttribute('data-copy')||data.copy);
    data.desc=existingEl.getAttribute('data-desc')||data.desc;
    data.linkUrl=existingEl.getAttribute('data-link-url')||data.linkUrl;
    data.linkNewTab=existingEl.getAttribute('data-link-newtab')!=='false';
  }
  $('icbLabel').value=data.label;
  $('icbIcon').value=data.icon;
  $('icbCopyContent').value=data.copy;
  $('icbDesc').value=data.desc;
  $('icbLinkUrl').value=data.linkUrl;
  $('icbLinkNewTab').checked=data.linkNewTab;
  _icbMode=data.mode;
  _icbStyle=data.style;
  _icbBehavior=data.behavior;
  _toggleIcbBehavior();

  /* Update UI selections */
  overlay.querySelectorAll('#icbDisplayRow .icb-mode-opt').forEach(function(el){
    el.classList.toggle('active',el.getAttribute('data-mode')===_icbMode);
  });
  overlay.querySelectorAll('#icbBehaviorRow .icb-mode-opt').forEach(function(el){
    el.classList.toggle('active',el.getAttribute('data-behavior')===_icbBehavior);
  });
  overlay.querySelectorAll('.icb-style-opt').forEach(function(el){
    el.classList.toggle('active',el.getAttribute('data-style')===_icbStyle);
  });
  overlay.classList.add('show');
}

/* Behavior toggle (copy / link) */
function _toggleIcbBehavior(){
  var isCopy=_icbBehavior==='copy';
  $('icbCopyField').style.display=isCopy?'':'none';
  $('icbLinkField').style.display=isCopy?'none':'';
  $('icbLinkTargetField').style.display=isCopy?'none':'';
  if(isCopy){
    $('icbLabel').placeholder='\u4F8B\uFF1A\u8907\u88FD Prompt / \u8907\u88FD\u9023\u7D50';
    if(!$('icbLabel').value||$('icbLabel').value==='\u524D\u5F80\u5DE5\u5177')$('icbLabel').value='\u9EDE\u6211\u8907\u88FD';
    if(!$('icbIcon').value||$('icbIcon').value==='\u2197')$('icbIcon').value='\uD83D\uDCCB';
  }else{
    $('icbLabel').placeholder='\u4F8B\uFF1A\u524D\u5F80\u5DE5\u5177 / \u958B\u555F\u9023\u7D50';
    if(!$('icbLabel').value||$('icbLabel').value==='\u9EDE\u6211\u8907\u88FD')$('icbLabel').value='\u524D\u5F80\u5DE5\u5177';
    if(!$('icbIcon').value||$('icbIcon').value==='\uD83D\uDCCB')$('icbIcon').value='\u2197';
  }
}
$('icbBehaviorRow').querySelectorAll('.icb-mode-opt').forEach(function(el){
  el.onclick=function(){
    _icbBehavior=this.getAttribute('data-behavior');
    $('icbBehaviorRow').querySelectorAll('.icb-mode-opt').forEach(function(b){b.classList.remove('active')});
    this.classList.add('active');
    _toggleIcbBehavior();
  };
});
/* Display mode toggle (block / inline) */
$('icbDisplayRow').querySelectorAll('.icb-mode-opt').forEach(function(el){
  el.onclick=function(){
    _icbMode=this.getAttribute('data-mode');
    $('icbDisplayRow').querySelectorAll('.icb-mode-opt').forEach(function(b){b.classList.remove('active')});
    this.classList.add('active');
  };
});

/* Style toggle */
$('icbDialogOverlay').querySelectorAll('.icb-style-opt').forEach(function(el){
  el.onclick=function(){
    _icbStyle=this.getAttribute('data-style');
    $('icbDialogOverlay').querySelectorAll('.icb-style-opt').forEach(function(b){b.classList.remove('active')});
    this.classList.add('active');
  };
});

/* Cancel */
$('icbCancel').onclick=function(){
  $('icbDialogOverlay').classList.remove('show');
  _icbEditTarget=null;
};

/* Prevent paste interception on copy content textarea */
$('icbCopyContent').addEventListener('paste',function(e){e.stopPropagation()});
$('icbCopyContent').addEventListener('keydown',function(e){e.stopPropagation()});
$('icbCopyContent').addEventListener('input',function(e){e.stopPropagation()});

/* Delete */
$('icbDelete').onclick=function(){
  if(_icbEditTarget){
    _icbEditTarget.parentNode.removeChild(_icbEditTarget);
    toast('已刪除複製按鈕');
  }
  $('icbDialogOverlay').classList.remove('show');
  _icbEditTarget=null;
};

/* Confirm insert/update */
$('icbConfirm').onclick=function(){
  var label=$('icbLabel').value.trim()||((_icbBehavior==='copy')?'\u9EDE\u6211\u8907\u88FD':'\u524D\u5F80\u5DE5\u5177');
  var icon=$('icbIcon').value.trim()||((_icbBehavior==='copy')?'\uD83D\uDCCB':'\u2197');
  var copyContent=(_icbBehavior==='copy')?($('icbCopyContent').value||''):'';
  var linkUrl=(_icbBehavior==='link')?($('icbLinkUrl').value.trim()||''):'';
  var linkNewTab=$('icbLinkNewTab').checked;
  var desc=$('icbDesc').value.trim();
  if(_icbBehavior==='copy'&&!copyContent){toast('\u8ACB\u8F38\u5165\u8907\u88FD\u5167\u5BB9');return;}
  if(_icbBehavior==='link'&&!linkUrl){toast('\u8ACB\u8F38\u5165\u9023\u7D50 URL');return;}

  var html=buildIcbHtml({label:label,icon:icon,behavior:_icbBehavior,style:_icbStyle,mode:_icbMode,copy:copyContent,linkUrl:linkUrl,linkNewTab:linkNewTab,desc:desc});

  if(_icbEditTarget){
    /* Update existing */
    _icbEditTarget.outerHTML=html;
  }else{
    /* Replace the marker with the copy button */
    var marker=document.getElementById(_ICB_MARKER_ID);
    if(marker){
      marker.outerHTML=html;
    }else{
      /* Fallback: insert at end of editor */
      var editor=$('articleEditor');
      if(editor){editor.innerHTML+=html;}
    }
  }
  $('icbDialogOverlay').classList.remove('show');
  _icbEditTarget=null;
};

function _b64e(s){
  if(!s)return '';
  try{
    var encoded=encodeURIComponent(s);
    var bytes=unescape(encoded);
    if(bytes.length>2097152)bytes=bytes.substring(0,2097152);
    return btoa(bytes);
  }catch(e){
    /* Fallback: encode char by char */
    try{
      var result='';
      var utf8=unescape(encodeURIComponent(s.substring(0,500000)));
      result=btoa(utf8);
      return result;
    }catch(e2){return ''}
  }
}
function _b64d(s){try{return decodeURIComponent(escape(atob(s)))}catch(e){return s}}
function buildIcbHtml(d){
  var behavior=d.behavior||'copy';
  var b64=(behavior==='copy')?_b64e(d.copy):'';
  var linkAttr=(behavior==='link')?' data-link-url="'+esc(d.linkUrl||'')+'" data-link-newtab="'+(d.linkNewTab!==false)+'"':'';
  var copyAttr=(behavior==='copy')?' data-copy-b64="'+esc(b64)+'"':'';
  var descAttr=d.desc?' data-desc="'+esc(d.desc)+'"':'';
  var descHtml=d.desc?'<div class="icb-desc">'+esc(d.desc)+'</div>':'';
  var previewText='';
  if(behavior==='copy'&&d.copy){previewText=esc(d.copy.length>120?d.copy.substring(0,120)+'\u2026':d.copy)}
  else if(behavior==='link'&&d.linkUrl){previewText='\uD83D\uDD17 '+esc(d.linkUrl.length>60?d.linkUrl.substring(0,60)+'\u2026':d.linkUrl)}
  var baseAttrs='data-label="'+esc(d.label)+'" data-icon="'+esc(d.icon)+'" data-behavior="'+behavior+'" data-style="'+d.style+'" data-mode="'+d.mode+'"'+copyAttr+linkAttr+descAttr;
  var behaviorLabel=(behavior==='copy')?'\uD83D\uDCCB \u8907\u88FD':'\uD83D\uDD17 \u9023\u7D50';
  if(d.mode==='block'){
    return '<div class="inline-copy-btn" '+baseAttrs+' contenteditable="false">'
      +descHtml
      +(previewText?'<div class="icb-preview">'+previewText+'</div>':'')
      +'<div class="icb-bar"><span class="icb-label">'+behaviorLabel+'</span>'
      +'<span class="icb-action style-'+d.style+'">'+esc(d.icon)+' '+esc(d.label)+'</span></div>'
      +'<span class="icb-delete-hint" title="\u9EDE\u6211\u7DE8\u8F2F">\u270F\uFE0F</span></div>';
  }else{
    return '<span class="inline-copy-btn" '+baseAttrs+' contenteditable="false">'
      +'<span class="icb-bar"><span class="icb-action style-'+d.style+'">'+esc(d.icon)+' '+esc(d.label)+'</span></span></span>';
  }
}

/* Click-to-edit in editor: delegate from articleEditor */
document.addEventListener('click',function(e){
  var target=e.target.closest('.inline-copy-btn');
  if(!target)return;
  /* Only allow edit if inside the rte-editor */
  var editor=$('articleEditor');
  if(editor&&editor.contains(target)){
    e.preventDefault();
    e.stopPropagation();
    openIcbDialog(target);
  }
});

/* ====== HYDRATE inline-copy-btn in article reader ====== */
function hydrateInlineCopyBtns(container){
  var btns=container.querySelectorAll('.inline-copy-btn');
  btns.forEach(function(el){
    var behavior=el.getAttribute('data-behavior')||'copy';
    var copyContent=el.getAttribute('data-copy-b64')?_b64d(el.getAttribute('data-copy-b64')):(el.getAttribute('data-copy')||'');
    var linkUrl=el.getAttribute('data-link-url')||'';
    var linkNewTab=el.getAttribute('data-link-newtab')!=='false';
    var label=el.getAttribute('data-label')||(behavior==='copy'?'\u9EDE\u6211\u8907\u88FD':'\u524D\u5F80\u5DE5\u5177');
    var icon=el.getAttribute('data-icon')||(behavior==='copy'?'\uD83D\uDCCB':'\u2197');
    var style=el.getAttribute('data-style')||'primary';
    var mode=el.getAttribute('data-mode')||'block';
    var desc=el.getAttribute('data-desc')||'';

    el.innerHTML='';
    el.removeAttribute('contenteditable');

    if(mode==='block'){
      if(desc){var descEl=document.createElement('div');descEl.className='icb-desc';descEl.textContent=desc;el.appendChild(descEl)}
      /* Preview area — only for copy mode */
      if(behavior==='copy'&&copyContent){
        var preview=document.createElement('div');
        preview.className='icb-preview';
        preview.textContent=copyContent;
        el.appendChild(preview);
        setTimeout(function(){
          if(preview.scrollHeight>preview.clientHeight+4){
            preview.classList.add('expandable');
            preview.onclick=function(){this.classList.toggle('expanded');this.classList.toggle('expandable')};
            preview.style.cursor='pointer';
          }
        },50);
      }
      var bar=document.createElement('div');bar.className='icb-bar';
      var lbl=document.createElement('span');lbl.className='icb-label';
      lbl.textContent=behavior==='copy'?'\uD83D\uDCCB \u8907\u88FD':'\uD83D\uDD17 \u9023\u7D50';
      bar.appendChild(lbl);
      var btn=document.createElement('button');
      btn.className='icb-action style-'+style;
      btn.textContent=icon+' '+label;
      if(behavior==='link'){
        btn.onclick=function(){window.open(linkUrl,linkNewTab?'_blank':'_self')};
      }else{
        btn.onclick=function(){copyText(copyContent);var o=btn.textContent;btn.textContent='\u2705 \u5DF2\u8907\u88FD\uFF01';setTimeout(function(){btn.textContent=o},2000)};
      }
      bar.appendChild(btn);el.appendChild(bar);
    }else{
      var bar=document.createElement('span');bar.className='icb-bar';
      var btn=document.createElement('button');
      btn.className='icb-action style-'+style;
      btn.textContent=icon+' '+label;
      if(behavior==='link'){
        btn.onclick=function(e){e.stopPropagation();window.open(linkUrl,linkNewTab?'_blank':'_self')};
      }else{
        btn.onclick=function(e){e.stopPropagation();copyText(copyContent);var o=btn.textContent;btn.textContent='\u2705 \u5DF2\u8907\u88FD\uFF01';setTimeout(function(){btn.textContent=o},2000)};
      }
      bar.appendChild(btn);
      el.appendChild(bar);
    }
  });
}

init();
})();
